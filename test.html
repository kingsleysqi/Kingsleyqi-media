<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINGSLEY · MEDIA</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    background: #0d0d0f;
    color: #f0e8d8;
    font-family: 'DM Mono', monospace;
    padding: 20px;
  }
  
  .container {
    max-width: 1400px;
    margin: 0 auto;
  }
  
  /* 头部区域 */
  .header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #c9a84c33;
  }
  
  .header h2 {
    font-size: 32px;
    color: #c9a84c;
    letter-spacing: 2px;
  }
  
  .header p {
    color: #888;
    margin-top: 8px;
    font-size: 14px;
  }
  
  /* 分类菜单栏 */
  .category-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 30px;
    padding: 15px;
    background: #1a1a1a;
    border-radius: 12px;
    justify-content: center;
    border: 1px solid #c9a84c33;
  }
  
  .category-btn {
    background: transparent;
    border: 1px solid #c9a84c66;
    color: #c9a84c;
    padding: 8px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  
  .category-btn:hover {
    background: #c9a84c33;
    transform: translateY(-2px);
  }
  
  .category-btn.active {
    background: #c9a84c;
    color: #0d0d0f;
    border-color: #c9a84c;
    box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
  }
  
  /* 自定义分类样式 */
  .category-btn.custom {
    border-color: #8b5cf6;
    color: #8b5cf6;
  }
  
  .category-btn.custom.active {
    background: #8b5cf6;
    color: #0d0d0f;
    border-color: #8b5cf6;
  }
  
  /* 媒体网格 */
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  
  .media-card {
    background: #111111;
    border: 1px solid #c9a84c33;
    border-radius: 12px;
    padding: 0;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    position: relative;
  }
  
  .media-card:hover {
    transform: translateY(-5px);
    border-color: #c9a84c;
    box-shadow: 0 8px 24px rgba(201, 168, 76, 0.2);
  }
  
  .media-poster {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
  }
  
  .media-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .media-poster .placeholder {
    font-size: 48px;
    opacity: 0.5;
  }
  
  .media-info {
    padding: 15px;
  }
  
  .media-type {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #c9a84c33;
    color: #c9a84c;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  
  .media-name {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .media-year {
    font-size: 12px;
    color: #888;
  }
  
  /* 剧集列表样式 */
  .episodes-list {
    margin-top: 8px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  
  .media-card.expanded .episodes-list {
    max-height: 500px;
  }
  
  .episode-item {
    font-size: 12px;
    padding: 4px 8px;
    background: #1a1a1a;
    margin: 4px 0;
    border-radius: 4px;
    cursor: pointer;
  }
  
  .episode-item:hover {
    background: #c9a84c33;
  }
  
  .expand-btn {
    margin-top: 8px;
    font-size: 12px;
    color: #c9a84c;
    cursor: pointer;
    text-align: center;
  }
  
  /* 加载和空状态 */
  .loading, .empty {
    text-align: center;
    padding: 60px;
    color: #888;
    font-size: 16px;
  }
  
  .loading {
    animation: pulse 1.5s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  /* 播放器模态框 */
  #player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    flex-direction: column;
    z-index: 1000;
  }
  
  #player-modal.open {
    display: flex;
  }
  
  #player-video, #player-audio {
    width: 100%;
    max-height: 80vh;
    background: #000;
    margin-top: 12px;
  }
  
  .player-header {
    display: flex;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid #c9a84c33;
    align-items: center;
  }
  
  #player-title {
    font-size: 18px;
    color: #c9a84c;
  }
  
  .player-close {
    cursor: pointer;
    color: #c9a84c;
    border: none;
    background: none;
    font-size: 24px;
    padding: 8px 16px;
    transition: transform 0.2s;
  }
  
  .player-close:hover {
    transform: scale(1.1);
  }
  
  .player-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  /* 统计信息 */
  .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 13px;
  }
  
  .stat-item {
    background: #1a1a1a;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #c9a84c33;
  }
  
  .stat-number {
    color: #c9a84c;
    font-weight: bold;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🎬 KINGSLEY · MEDIA</h2>
    <p>动态媒体库 | 支持自定义分类</p>
  </div>
  
  <!-- 动态分类菜单栏 -->
  <div id="category-bar" class="category-bar">
    <button class="category-btn active" data-type="all">📺 全部</button>
    <!-- 动态生成的分类按钮会插入到这里 -->
  </div>
  
  <!-- 统计信息 -->
  <div id="stats" class="stats"></div>
  
  <!-- 媒体网格 -->
  <div id="media-grid" class="media-grid">
    <div class="loading">🎬 加载中...</div>
  </div>
</div>

<!-- Player Modal -->
<div id="player-modal">
  <div class="player-header">
    <div id="player-title">—</div>
    <button class="player-close" id="player-close">✕</button>
  </div>
  <div class="player-content">
    <video id="player-video" controls playsinline></video>
    <audio id="player-audio" controls></audio>
  </div>
</div>

<script>
const CDN_BASE = 'https://media.kingsleyqi.com'; // 您的 R2 公开访问域名
let allItems = [];
let categories = [];
let currentFilter = 'all';

const grid = document.getElementById('media-grid');
const categoryBar = document.getElementById('category-bar');
const statsDiv = document.getElementById('stats');

/**
 * 加载媒体列表和分类配置
 */
async function loadMediaData() {
  try {
    grid.innerHTML = '<div class="loading">🎬 加载中...</div>';
    
    const response = await fetch('/api/list');
    const data = await response.json();
    
    allItems = data.items || [];
    categories = data.categories || [];
    
    // 渲染分类菜单
    renderCategoryBar();
    
    // 渲染统计信息
    renderStats(data.stats);
    
    // 渲染媒体列表
    renderMediaGrid(currentFilter);
    
  } catch (error) {
    console.error('加载失败:', error);
    grid.innerHTML = `<div class="empty">❌ 加载失败: ${error.message}</div>`;
  }
}

/**
 * 渲染动态分类菜单栏
 */
function renderCategoryBar() {
  // 保留"全部"按钮
  let buttons = '<button class="category-btn active" data-type="all">📺 全部</button>';
  
  // 内置分类
  const builtinCategories = [
    { slug: 'movies', name: '🎬 电影', icon: '🎬' },
    { slug: 'tvshows', name: '📺 剧集', icon: '📺' },
    { slug: 'music', name: '🎵 音乐', icon: '🎵' }
  ];
  
  // 添加内置分类
  for (const cat of builtinCategories) {
    buttons += `
      <button class="category-btn" data-type="${cat.slug}">
        ${cat.icon} ${cat.name}
      </button>
    `;
  }
  
  // 添加自定义分类（从 R2 读取）
  for (const cat of categories) {
    // 确保每个分类都有必要的字段
    const displayName = cat.name || cat.slug;
    const icon = cat.icon || getCategoryIcon(cat.slug);
    buttons += `
      <button class="category-btn custom" data-type="${escapeHtml(cat.slug)}">
        ${icon} ${escapeHtml(displayName)}
      </button>
    `;
  }
  
  categoryBar.innerHTML = buttons;
  
  // 绑定点击事件
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // 更新激活状态
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // 更新当前筛选类型
      currentFilter = btn.dataset.type;
      
      // 重新渲染媒体列表
      renderMediaGrid(currentFilter);
    });
  });
}

/**
 * 获取分类图标
 */
function getCategoryIcon(slug) {
  const icons = {
    'movies': '🎬',
    'tvshows': '📺',
    'music': '🎵',
    'anime': '🌸',
    'documentary': '📹',
    'variety': '🎭'
  };
  return icons[slug] || '📁';
}

/**
 * 渲染统计信息
 */
function renderStats(stats) {
  if (!stats) return;
  statsDiv.innerHTML = `
    <div class="stat-item"><span class="stat-number">${stats.movies || 0}</span> 电影</div>
    <div class="stat-item"><span class="stat-number">${stats.tvshows || 0}</span> 剧集</div>
    <div class="stat-item"><span class="stat-number">${stats.music || 0}</span> 音乐</div>
  `;
}

/**
 * 渲染媒体网格
 * @param {string} type - 筛选类型: 'all', 'movies', 'tvshows', 'music', 或自定义分类 slug
 */
function renderMediaGrid(type) {
  let filteredItems = allItems;
  
  if (type !== 'all') {
    filteredItems = allItems.filter(item => item.type === type);
  }
  
  if (filteredItems.length === 0) {
    grid.innerHTML = '<div class="empty">📭 暂无媒体内容</div>';
    return;
  }
  
  grid.innerHTML = filteredItems.map(item => createMediaCard(item)).join('');
  
  // 绑定剧集展开事件
  document.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = btn.closest('.media-card');
      if (card) card.classList.toggle('expanded');
    });
  });
  
  // 绑定卡片点击事件
  document.querySelectorAll('.media-card').forEach((card, index) => {
    const originalIndex = filteredItems.findIndex(
      item => item.id === card.dataset.id
    );
    if (originalIndex !== -1) {
      const item = filteredItems[originalIndex];
      card.onclick = (e) => {
        // 避免点击展开按钮时触发
        if (e.target.classList && e.target.classList.contains('expand-btn')) return;
        if (e.target.classList && e.target.classList.contains('episode-item')) {
          // 点击剧集项
          const key = e.target.dataset.key;
          openMediaItem(item, key);
        } else {
          openMediaItem(item);
        }
      };
    }
  });
}

/**
 * 创建媒体卡片 HTML
 */
function createMediaCard(item) {
  const typeIcon = getTypeIcon(item.type);
  const posterUrl = item.poster ? `${CDN_BASE}/${item.poster}` : null;
  
  // 判断是否有剧集
  const hasEpisodes = item.episodes && item.episodes.length > 0;
  const episodeCount = hasEpisodes ? item.episodes.length : 0;
  
  // 剧集列表 HTML
  let episodesHtml = '';
  if (hasEpisodes && episodeCount > 0) {
    episodesHtml = `
      <div class="expand-btn">📺 展开剧集 (${episodeCount}集) ▼</div>
      <div class="episodes-list">
        ${item.episodes.slice(0, 20).map(ep => `
          <div class="episode-item" data-key="${escapeHtml(ep.key)}">
            ${escapeHtml(ep.name || ep.key.split('/').pop())}
          </div>
        `).join('')}
        ${episodeCount > 20 ? `<div class="episode-item" style="text-align:center; opacity:0.7;">... 还有 ${episodeCount - 20} 集</div>` : ''}
      </div>
    `;
  }
  
  return `
    <div class="media-card" data-id="${escapeHtml(item.id)}">
      <div class="media-poster">
        ${posterUrl ? 
          `<img src="${escapeHtml(posterUrl)}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.src=''; this.nextElementSibling.style.display='flex';">` : 
          ''
        }
        <div class="placeholder" ${posterUrl ? 'style="display:none;"' : ''}>
          ${typeIcon}
        </div>
      </div>
      <div class="media-info">
        <div class="media-type">${typeIcon} ${getTypeLabel(item.type)}</div>
        <div class="media-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
        ${item.year ? `<div class="media-year">📅 ${item.year}</div>` : ''}
        ${episodesHtml}
      </div>
    </div>
  `;
}

/**
 * 获取类型图标
 */
function getTypeIcon(type) {
  const icons = {
    'movies': '🎬',
    'tvshows': '📺',
    'music': '🎵'
  };
  return icons[type] || '🎬';
}

/**
 * 获取类型标签
 */
function getTypeLabel(type) {
  const labels = {
    'movies': '电影',
    'tvshows': '剧集',
    'music': '音乐'
  };
  return labels[type] || type;
}

/**
 * 打开媒体播放
 * @param {object} item - 媒体项
 * @param {string} episodeKey - 剧集 key（可选）
 */
function openMediaItem(item, episodeKey) {
  const modal = document.getElementById('player-modal');
  const videoEl = document.getElementById('player-video');
  const audioEl = document.getElementById('player-audio');
  const titleEl = document.getElementById('player-title');
  
  // 确定要播放的文件路径
  let fileKey = episodeKey || item.url;
  if (!fileKey && item.episodes && item.episodes.length > 0) {
    fileKey = item.episodes[0].key;
  }
  
  if (!fileKey) {
    alert('无法播放：找不到媒体文件');
    return;
  }
  
  const fileName = fileKey.split('/').pop();
  titleEl.textContent = `${item.name} - ${fileName}`;
  
  videoEl.style.display = 'none';
  audioEl.style.display = 'none';
  videoEl.src = '';
  audioEl.src = '';
  
  const url = `${CDN_BASE}/${fileKey}`;
  const isHLS = url.endsWith('.m3u8');
  const isAudio = item.type === 'music' || /\.(mp3|flac|aac|ogg|wav|m4a)$/i.test(fileName);
  
  if (isAudio) {
    audioEl.src = url;
    audioEl.play().catch(e => console.log('播放失败:', e));
    audioEl.style.display = 'block';
  } else {
    if (isHLS && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(videoEl);
      hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(() => {}));
    } else {
      videoEl.src = url;
      videoEl.play().catch(() => {});
    }
    videoEl.style.display = 'block';
  }
  
  modal.classList.add('open');
}

/**
 * 关闭播放器
 */
function closeModal() {
  const modal = document.getElementById('player-modal');
  const videoEl = document.getElementById('player-video');
  const audioEl = document.getElementById('player-audio');
  
  modal.classList.remove('open');
  videoEl.pause();
  videoEl.src = '';
  audioEl.pause();
  audioEl.src = '';
}

/**
 * 转义 HTML 防止 XSS
 */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 绑定关闭事件
document.getElementById('player-close').onclick = closeModal;

// 点击模态框背景关闭
document.getElementById('player-modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('player-modal')) {
    closeModal();
  }
});

// 键盘 ESC 关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
  }
});

// 页面加载
window.onload = loadMediaData;
</script>
</body>
</html>
