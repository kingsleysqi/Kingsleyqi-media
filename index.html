<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingsley 媒体库</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- HLS.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { background:#0f0f0f; color:#f9f6f2; font-family:'Arial', sans-serif; }
#loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px; }
.loader { border:4px solid #f3f3f3; border-top:4px solid #e3c77c; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin-bottom:10px;}
@keyframes spin {0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.filter-tabs { display:flex; gap:10px; margin:20px 0; justify-content:center; }
.tab-btn { padding:6px 16px; background:#1a1a1a; border:none; color:#f9f6f2; border-radius:6px; cursor:pointer; transition:all 0.2s; }
.tab-btn.active { background:#e3c77c; color:#000; }
.media-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; margin:20px; }
.media-card { position:relative; overflow:hidden; border-radius:12px; background:#1a1a1a; cursor:pointer; transition:transform 0.2s; }
.media-card:hover { transform:scale(1.05); }
.card-poster { width:100%; display:block; }
.card-overlay { position:absolute; bottom:0; width:100%; background:linear-gradient(transparent, rgba(0,0,0,0.8)); padding:8px; color:#fff; }
.card-name { font-weight:bold; font-size:14px; }
.card-meta { font-size:12px; opacity:0.8; }
.card-play-btn { margin-top:4px; padding:4px 8px; background:#e3c77c; color:#000; border:none; border-radius:4px; cursor:pointer; }
.empty-state { text-align:center; margin-top:50px; color:#999; }
.empty-icon { font-size:50px; margin-bottom:10px; }
#error-banner { display:none; background:#ff4c4c; color:#fff; padding:10px; text-align:center; }
#player-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; }
#player-modal.open { display:flex; }
.player-header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; border-bottom:1px solid #333; }
.player-title { font-size:18px; font-weight:bold; }
.player-subtitle { font-size:14px; color:#ccc; }
.player-close { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
.player-body { display:flex; flex:1; overflow:hidden; }
.player-main { flex:3; display:flex; align-items:center; justify-content:center; background:#000; }
#video-player { max-width:100%; max-height:100%; border-radius:8px; }
.player-sidebar { flex:1; background:#1a1a1a; overflow-y:auto; padding:10px; }
.sidebar-section-title { font-weight:bold; margin-bottom:10px; }
.episode-item { display:flex; align-items:center; padding:6px; cursor:pointer; border-radius:6px; margin-bottom:4px; background:#111; }
.episode-item.active { background:#e3c77c; color:#000; }
.ep-num { width:30px; text-align:center; margin-right:6px; font-weight:bold; }
</style>
</head>
<body>

<div class="filter-tabs">
  <button class="tab-btn active" data-filter="all">全部</button>
  <button class="tab-btn" data-filter="tvshows">剧集</button>
  <button class="tab-btn" data-filter="movies">电影</button>
  <button class="tab-btn" data-filter="music">音乐</button>
</div>

<section id="media-section">
  <div id="loading">
    <div class="loader"></div>
    <p>加载中，请稍候…</p>
  </div>
  <div class="media-grid" id="media-grid"></div>
  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-icon">🎬</div>
    <div class="empty-text">没有找到内容</div>
    <div class="empty-sub">请尝试其他搜索或筛选</div>
  </div>
</section>

<div id="error-banner"></div>

<div id="player-modal">
  <div class="player-header">
    <div>
      <div class="player-title" id="player-title">Title</div>
      <div class="player-subtitle" id="player-subtitle">Subtitle</div>
    </div>
    <button class="player-close" id="player-close">✕</button>
  </div>
  <div class="player-body">
    <div class="player-main">
      <video id="video-player" controls></video>
    </div>
    <div class="player-sidebar" id="episode-list">
      <div class="sidebar-section-title">播放列表</div>
    </div>
  </div>
</div>

<script>
// -------- R2 API 地址配置 --------
const R2_BASE = 'https://<你的R2域名>.r2.cloudflarestorage.com/media/';

// -------- 工具函数 --------
async function fetchMediaList() {
  try {
    const res = await fetch('/api/list'); // Pages Function 动态生成列表
    if(!res.ok) throw new Error('读取失败');
    const data = await res.json();
    return data; // [{type:'tvshows', name:'xxx', poster:'...', episodes:[{name,url}]}]
  } catch(e){
    showError(e.message);
    return [];
  }
}

function showError(msg){
  const banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = 'block';
}

// -------- 渲染 --------
const mediaGrid = document.getElementById('media-grid');
const loadingEl = document.getElementById('loading');
const emptyState = document.getElementById('empty-state');
const tabs = document.querySelectorAll('.tab-btn');
let currentFilter = 'all';
let mediaItems = [];

function renderMedia(){
  mediaGrid.innerHTML = '';
  let filtered = mediaItems.filter(item => currentFilter==='all'?true:item.type===currentFilter);
  if(filtered.length===0) emptyState.style.display='block';
  else emptyState.style.display='none';

  filtered.forEach(item=>{
    const card = document.createElement('div');
    card.className='media-card';
    card.innerHTML = `
      ${item.poster?`<img class="card-poster" src="${item.poster}" alt="${item.name}">`:`<div class="card-no-poster"><div class="card-icon">🎬</div><div class="card-no-name">${item.name}</div></div>`}
      <div class="card-overlay">
        <div class="card-name">${item.name}</div>
        <div class="card-meta">${item.type}</div>
        <button class="card-play-btn">PLAY ▶</button>
      </div>`;
    mediaGrid.appendChild(card);
    card.querySelector('.card-play-btn').addEventListener('click',()=>openPlayer(item));
  });
}

// -------- 播放器 --------
function openPlayer(item){
  const modal = document.getElementById('player-modal');
  const video = document.getElementById('video-player');
  const title = document.getElementById('player-title');
  const subtitle = document.getElementById('player-subtitle');
  const episodeList = document.getElementById('episode-list');
  modal.classList.add('open');
  title.textContent = item.name;
  subtitle.textContent = item.type;
  episodeList.innerHTML='<div class="sidebar-section-title">播放列表</div>';
  if(item.episodes){
    item.episodes.forEach((ep,i)=>{
      const div=document.createElement('div');
      div.className='episode-item';
      div.innerHTML=`<div class="ep-num">${i+1}</div><div class="ep-info"><div class="ep-name">${ep.name}</div></div>`;
      div.addEventListener('click',()=>playEpisode(ep,div));
      episodeList.appendChild(div);
    });
    playEpisode(item.episodes[0],episodeList.querySelector('.episode-item'));
  } else if(item.url){
    video.src=item.url; video.play();
  }
}

function playEpisode(ep,div){
  const video=document.getElementById('video-player');
  document.querySelectorAll('.episode-item').forEach(i=>i.classList.remove('active'));
  div.classList.add('active');
  if(Hls.isSupported() && ep.url.endsWith('.m3u8')){
    if(window.hls) window.hls.destroy();
    window.hls=new Hls();
    window.hls.loadSource(ep.url);
    window.hls.attachMedia(video);
    window.hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
  } else { video.src=ep.url; video.play(); }
}

document.getElementById('player-close').addEventListener('click',()=>{
  const modal=document.getElementById('player-modal');
  modal.classList.remove('open');
  const video=document.getElementById('video-player');
  video.pause(); video.src='';
  if(window.hls){ window.hls.destroy(); window.hls=null; }
});

// -------- Tabs 筛选 --------
tabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter=tab.dataset.filter;
    renderMedia();
  });
});

// -------- 初始化 --------
window.addEventListener('DOMContentLoaded',async()=>{
  loadingEl.style.display='flex';
  mediaItems=await fetchMediaList();
  loadingEl.style.display='none';
  renderMedia();
});
</script>

</body>
</html>
