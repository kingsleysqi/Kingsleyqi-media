<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KINGSLEY · MEDIA v3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>

  <style>
    :root{--gold:#c9a84c;--gold-dim:#8a6f32;--cream:#f0e8d8;--ink:#0d0d0f;--ink-2:#16161a;--ink-3:#1f1f26;--ink-4:#2a2a35;--mist:rgba(201,168,76,0.08);--mist2:rgba(240,232,216,0.04)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background-color:var(--ink);color:var(--cream);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:default}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
    
    header{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(13,13,15,0.95) 0%,transparent 100%);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.12)}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase}
    .logo span{color:var(--cream);font-weight:600}
    
    .hero{height:80vh;min-height:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,0.06) 0%,transparent 70%),linear-gradient(180deg,var(--ink) 0%,var(--ink-2) 100%)}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:300;line-height:0.9;color:var(--cream);text-align:center;position:relative}
    .hero-title em{font-style:italic;color:var(--gold)}

    /* 修复后的首页网格布局 */
    .filter-section{padding:40px 48px 20px;border-bottom:1px solid rgba(201,168,76,0.1)}
    .filter-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab-btn{padding:6px 16px;background:transparent;border:1px solid rgba(201,168,76,0.15);color:rgba(240,232,216,0.45);font-size:0.65rem;text-transform:uppercase;cursor:pointer;transition:all 0.25s}
    .tab-btn.active{background:var(--mist);border-color:var(--gold);color:var(--gold)}

    #media-section{padding:40px 48px 120px;width:100%}
    .media-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:4px;width:100%}
    
    .media-card{position:relative;aspect-ratio:2/3;background:var(--ink-3);cursor:pointer;overflow:hidden;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1)}
    .media-card:hover{transform:scale(1.02);z-index:2}
    .card-poster{width:100%;height:100%;object-fit:cover;transition:transform 0.6s;opacity:0.85}
    .media-card:hover .card-poster{transform:scale(1.05);opacity:1}
    .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,15,0.9) 0%,transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:15px;opacity:0;transition:opacity 0.3s}
    .media-card:hover .card-overlay{opacity:1}
    .card-name{font-family:'Noto Serif SC',serif;font-size:0.85rem;color:var(--cream)}

    /* 播放器弹窗布局 */
    #player-modal{position:fixed;inset:0;z-index:200;background:var(--ink);display:none;flex-direction:column}
    #player-modal.open{display:flex}
    .player-header{padding:15px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(201,168,76,0.1)}
    .player-body{flex:1;display:flex;overflow:hidden}
    .player-main{flex:1;background:#000;position:relative}
    .player-sidebar{width:320px;background:var(--ink-2);border-left:1px solid rgba(201,168,76,0.1);overflow-y:auto;display:flex;flex-direction:column}
    
    .episode-item{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer}
    .episode-item:hover{background:var(--mist2)}
    .episode-item.active{background:var(--mist);border-left:3px solid var(--gold)}

    /* 自定义控制栏样式 */
    .video-js .vjs-control-bar { display: none !important; }
    .custom-player-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); padding: 10px 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
    .progress-bar-container { position: absolute; bottom: 50px; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.2); cursor: pointer; }
    .progress-bar-fill { height: 100%; background: var(--gold); width: 0%; }

    @media(max-width:768px){
      header{padding:15px 20px}
      #media-section{padding:20px 15px}
      .media-grid{grid-template-columns:repeat(2, 1fr);gap:4px}
      .player-body{flex-direction:column}
      .player-main{height:35vh}
      .player-sidebar{width:100%;height:65vh;border-left:none;border-top:1px solid rgba(201,168,76,0.1)}
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>Kingsley Qi</span> · Media</div>
  <div class="search-wrap">
    <input type="text" id="search-input" class="bg-zinc-900 border border-zinc-800 px-4 py-1 text-xs outline-none focus:border-amber-600 transition-all" placeholder="Search..."/>
  </div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1 class="hero-title">Private <em>Collection</em></h1>
  </div>
</section>

<div class="filter-section">
  <div class="filter-tabs" id="filter-tabs">
    <button class="tab-btn active" data-filter="all">ALL</button>
  </div>
</div>

<section id="media-section">
  <div id="loading" class="text-center py-20 text-zinc-600 text-xs tracking-widest">LOADING ARCHIVE...</div>
  <div class="media-grid" id="media-grid"></div>
</section>

<div id="player-modal">
  <div class="player-header">
    <div>
      <div id="player-title" class="text-amber-500 font-serif text-lg"></div>
      <div id="player-subtitle" class="text-zinc-500 text-[10px] uppercase tracking-widest"></div>
    </div>
    <button id="player-close" class="text-zinc-400 hover:text-white">✕</button>
  </div>
  <div class="player-body">
    <div class="player-main" id="player-main">
      <div id="videojs-container" class="w-full h-full"></div>
    </div>
    <div class="player-sidebar" id="player-sidebar"></div>
  </div>
</div>

<script>
const CDN_BASE = 'https://cdn.kingsleyqi.com';
const API_URL = '/api/list';
let allItems = [];
let currentPlayer = null;

// 初始化数据
async function init() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    allItems = data.items || [];
    renderGrid(allItems);
    document.getElementById('loading').style.display = 'none';
  } catch(e) { console.error("Load failed", e); }
}

// 渲染网格
function renderGrid(items) {
  const grid = document.getElementById('media-grid');
  grid.innerHTML = items.map(item => `
    <div class="media-card" onclick="openItem('${item.id}')">
      <img class="card-poster" src="${item.poster.startsWith('http') ? item.poster : CDN_BASE + '/' + item.poster}" loading="lazy">
      <div class="card-overlay">
        <div class="card-name">${item.name}</div>
      </div>
    </div>
  `).join('');
}

// 销毁播放器
function destroyPlayer() {
  if (currentPlayer) { currentPlayer.dispose(); currentPlayer = null; }
  document.getElementById('videojs-container').innerHTML = '';
}

// 核心播放控制
async function openItem(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  document.getElementById('player-title').textContent = item.name;
  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (item.type === 'tvshows' && item.episodes?.length) {
    renderSidebar(item);
    playEpisode(id, 0);
  } else {
    document.getElementById('player-sidebar').style.display = 'none';
    startPlayback(item.url, item.name);
  }
}

function renderSidebar(item) {
  const sidebar = document.getElementById('player-sidebar');
  sidebar.style.display = 'flex';
  sidebar.innerHTML = `<div class="p-4 text-[10px] text-amber-700 tracking-widest border-bottom border-zinc-800">EPISODES</div>` + 
    item.episodes.map((ep, i) => `
    <div class="episode-item" onclick="playEpisode('${item.id}', ${i})">
      <div class="text-xs text-zinc-300">${ep.name}</div>
    </div>`).join('');
}

function playEpisode(itemId, index) {
  const item = allItems.find(i => i.id === itemId);
  const ep = item.episodes[index];
  document.getElementById('player-subtitle').textContent = ep.name;
  startPlayback(ep.url, ep.name);
  
  const els = document.querySelectorAll('.episode-item');
  els.forEach((el, i) => el.classList.toggle('active', i === index));
}

function startPlayback(url, title) {
  destroyPlayer();
  const container = document.getElementById('videojs-container');
  
  // B站 Iframe 逻辑分流
  if (url.includes('player.bilibili.com')) {
    const finalUrl = url.includes('?') ? `${url}&as_wide=1` : `${url}?as_wide=1`;
    container.innerHTML = `<iframe src="${finalUrl}" style="width:100%;height:100%;border:none;" allowfullscreen="true" scrolling="no"></iframe>`;
  } else {
    // Video.js 播放逻辑
    const videoEl = document.createElement('video');
    videoEl.className = 'video-js vjs-default-skin w-full h-full';
    container.appendChild(videoEl);
    
    const playableUrl = url.startsWith('http') ? url : `${CDN_BASE}/${url}`;
    currentPlayer = videojs(videoEl, {
      controls: true,
      autoplay: true,
      sources: [{ src: playableUrl, type: url.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4' }]
    });
  }
}

document.getElementById('player-close').onclick = () => {
  destroyPlayer();
  document.getElementById('player-modal').classList.remove('open');
  document.body.style.overflow = '';
};

init();
</script>
</body>
</html>
