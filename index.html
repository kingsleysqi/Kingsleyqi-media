<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KINGSLEY · MEDIA {version}</title>
  <script src="/version.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome 图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Video.js 核心库和样式 -->
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.17.0/dist/videojs-http-streaming.min.js"></script>

  <style>
    :root{--gold:#c9a84c;--gold-dim:#8a6f32;--cream:#f0e8d8;--ink:#0d0d0f;--ink-2:#16161a;--ink-3:#1f1f26;--ink-4:#2a2a35;--mist:rgba(201,168,76,0.08);--mist2:rgba(240,232,216,0.04)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background-color:var(--ink);color:var(--cream);font-family:'DM Mono',monospace;overflow-x:hidden;cursor:default}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
    header{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(13,13,15,0.95) 0%,transparent 100%);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.12)}
    .logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase}
    .logo span{color:var(--cream);font-weight:600}
    nav{display:flex;gap:32px;align-items:center}
    nav a{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(240,232,216,0.5);text-decoration:none;transition:color 0.3s}
    nav a:hover,nav a.active{color:var(--gold)}
    .search-wrap{position:relative;display:flex;align-items:center}
    .search-wrap input{background:var(--mist2);border:1px solid rgba(201,168,76,0.2);color:var(--cream);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.08em;padding:8px 36px 8px 14px;width:220px;border-radius:2px;outline:none;transition:border-color 0.3s,width 0.3s}
    .search-wrap input:focus{border-color:var(--gold-dim);width:280px}
    .search-wrap input::placeholder{color:rgba(240,232,216,0.3)}
    .search-icon{position:absolute;right:10px;color:rgba(201,168,76,0.5);font-size:0.8rem}
    .hero{height:100vh;min-height:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,0.06) 0%,transparent 70%),linear-gradient(180deg,var(--ink) 0%,var(--ink-2) 100%)}
    .hero-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.04) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 0%,transparent 80%)}
    .hero-content{position:relative;text-align:center}
    .hero-eyebrow{font-size:0.6rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;opacity:0;animation:fadeUp 1s 0.3s forwards}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,7rem);font-weight:300;line-height:0.9;letter-spacing:-0.02em;color:var(--cream);opacity:0;animation:fadeUp 1s 0.5s forwards}
    .hero-title em{font-style:italic;color:var(--gold)}
    .hero-sub{margin-top:28px;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(240,232,216,0.4);opacity:0;animation:fadeUp 1s 0.7s forwards}
    .hero-stats{margin-top:48px;display:flex;gap:40px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp 1s 0.9s forwards}
    .stat{text-align:center}
    .stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--gold)}
    .stat-label{font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(240,232,216,0.35);margin-top:4px}
    .scroll-cue{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(201,168,76,0.4);font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;animation:pulse 2s infinite}
    .scroll-cue::after{content:'';display:block;width:1px;height:48px;background:linear-gradient(to bottom,var(--gold-dim),transparent)}
    .filter-section{padding:80px 48px 32px;border-bottom:1px solid rgba(201,168,76,0.1)}
    .filter-title{font-family:'Cormorant Garamond',serif;font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(240,232,216,0.3);margin-bottom:20px}
    .filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
    .tab-btn{padding:8px 20px;background:transparent;border:1px solid rgba(201,168,76,0.15);color:rgba(240,232,216,0.45);font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border-radius:1px;transition:all 0.25s}
    .tab-btn:hover{border-color:var(--gold-dim);color:var(--cream)}
    .tab-btn.active{background:var(--mist);border-color:var(--gold);color:var(--gold)}
    #media-section{padding:48px 48px 120px}
    .section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:var(--cream)}
    .section-count{font-size:0.6rem;letter-spacing:0.2em;color:rgba(240,232,216,0.3)}
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px}
    .loader{width:40px;height:40px;border:1px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1.2s linear infinite}
    #loading p{font-size:0.6rem;letter-spacing:0.2em;color:rgba(240,232,216,0.3)}
    .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:2px}
    .media-card{position:relative;overflow:hidden;aspect-ratio:2/3;background:var(--ink-3);cursor:pointer;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1)}
    .media-card:hover{transform:scale(1.02);z-index:2}
    .card-poster{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1),opacity 0.3s;opacity:0.85}
    .media-card:hover .card-poster{transform:scale(1.06);opacity:1}
    .card-no-poster{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(135deg,var(--ink-3),var(--ink-4))}
    .card-icon{font-size:2rem;opacity:0.4}
    .card-no-name{font-family:'Cormorant Garamond',serif;font-size:0.85rem;color:rgba(240,232,216,0.4);text-align:center;padding:0 16px}
    .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,15,0.95) 0%,rgba(13,13,15,0.3) 40%,transparent 70%);opacity:0;transition:opacity 0.35s;display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
    .media-card:hover .card-overlay{opacity:1}
    .card-badge{position:absolute;top:10px;right:10px;background:rgba(13,13,15,0.8);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-size:0.5rem;letter-spacing:0.15em;padding:3px 8px;text-transform:uppercase}
    .card-progress-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.1)}
    .card-progress-fill{height:100%;background:var(--gold);transition:width 0.3s}
    .card-name{font-family:'Noto Serif SC',serif;font-size:0.9rem;font-weight:300;color:var(--cream);line-height:1.3;margin-bottom:4px}
    .card-meta{font-size:0.55rem;letter-spacing:0.1em;color:rgba(240,232,216,0.4);text-transform:uppercase}
    .card-play-btn{display:flex;align-items:center;gap:6px;margin-top:10px;background:var(--gold);color:var(--ink);border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;padding:7px 14px;transition:background 0.2s;width:fit-content}
    .card-play-btn:hover{background:var(--cream)}
    #player-modal{position:fixed;inset:0;z-index:200;background:rgba(13,13,15,0.97);display:none;flex-direction:column;animation:fadeIn 0.3s ease}
    #player-modal.open{display:flex}
    .player-header{padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,0.1);flex-shrink:0}
    .player-title-wrap{display:flex;flex-direction:column;gap:4px}
    .player-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--cream)}
    .player-subtitle{font-size:0.6rem;letter-spacing:0.15em;color:rgba(240,232,216,0.35);text-transform:uppercase}
    .player-close{background:none;border:1px solid rgba(201,168,76,0.2);color:rgba(240,232,216,0.5);cursor:pointer;width:36px;height:36px;font-size:1rem;transition:all 0.2s;border-radius:1px}
    .player-close:hover{border-color:var(--gold);color:var(--gold)}
    .player-body{flex:1;display:flex;overflow:hidden;min-height:0}
    .player-main{flex:1;display:flex;flex-direction:column;background:#000;position:relative;min-height:0}
    #videojs-container{width:100%;height:100%;min-height:0;background:#000;position:relative}
    .player-sidebar{width:300px;flex-shrink:0;background:var(--ink-2);border-left:1px solid rgba(201,168,76,0.08);display:flex;flex-direction:column;overflow-y:auto}
    .sidebar-section-title{padding:16px 20px 10px;font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(201,168,76,0.5);border-bottom:1px solid rgba(201,168,76,0.06)}
    .episode-item{padding:12px 20px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.2s;display:flex;align-items:center;gap:12px}
    .episode-item:hover{background:var(--mist2)}
    .episode-item.active{background:var(--mist);border-left:2px solid var(--gold)}
    .ep-num{font-size:0.6rem;color:var(--gold-dim);min-width:28px;text-align:center}
    .ep-info{flex:1}
    .ep-name{font-family:'Noto Serif SC',serif;font-size:0.78rem;color:var(--cream);line-height:1.4}
    .ep-progress{height:1px;background:rgba(255,255,255,0.08);margin-top:5px;border-radius:1px}
    .ep-progress-fill{height:100%;background:var(--gold);border-radius:1px}
    .empty-state{text-align:center;padding:80px}
    .empty-icon{font-size:3rem;opacity:0.3;margin-bottom:16px}
    .empty-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:rgba(240,232,216,0.3)}
    .empty-sub{font-size:0.6rem;letter-spacing:0.15em;color:rgba(240,232,216,0.2);margin-top:8px;text-transform:uppercase}
    #error-banner{display:none;margin:0 48px;padding:14px 20px;background:rgba(255,80,80,0.07);border:1px solid rgba(255,80,80,0.25);color:rgba(255,160,160,0.8);font-size:0.65rem;letter-spacing:0.08em;border-radius:1px}
    .click-loading { cursor: wait; opacity: 0.7; pointer-events: none; }

    /* ========== 自定义播放器控制栏 ========== */
    .video-js {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* 隐藏默认控制栏，使用自定义 */
    .video-js .vjs-control-bar {
      display: none !important;
    }

    /* 自定义控制栏容器 */
    .custom-player-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.6));
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 40;
      transition: opacity 0.3s ease;
    }

    .custom-player-controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* 进度条容器 */
    .progress-bar-container {
      position: absolute;
      bottom: 55px;
      left: 0;
      right: 0;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      z-index: 50;
      transition: height 0.2s ease, bottom 0.2s ease;
    }

    .progress-bar-container:hover {
      height: 6px;
      bottom: 54px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.1s linear;
      border-radius: 2px;
    }

    /* 控制按钮 */
    .control-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      font-size: 16px;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
      flex-shrink: 0;
    }

    .control-btn:hover {
      color: var(--gold);
    }

    .control-btn.active {
      color: var(--gold);
    }

    /* 音量滑块 */
    .volume-slider {
      width: 0;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      margin: 0 4px;
      transition: width 0.2s ease;
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
      border: none;
    }

    .volume-slider::-webkit-slider-runnable-track {
      background: rgba(255,255,255,0.2);
      height: 4px;
      border-radius: 2px;
    }

    .volume-slider::-moz-range-track {
      background: rgba(255,255,255,0.2);
      height: 4px;
      border-radius: 2px;
    }

    .volume-control:hover .volume-slider {
      width: 70px;
    }

    /* 时间显示 */
    .time-display {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin: 0 4px;
      font-weight: 500;
      min-width: 50px;
      text-align: center;
    }

    /* 大播放按钮 */
    .big-play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(0,0,0,0.6);
      border: 2px solid var(--gold);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--gold);
      transition: all 0.3s ease;
      z-index: 30;
    }

    .big-play-button:hover {
      background: rgba(0,0,0,0.8);
      border-color: var(--cream);
      color: var(--cream);
    }

    .big-play-button.hidden {
      display: none;
    }

    /* 移动设备优化 */
    @media (max-width: 768px) {
      .custom-player-controls {
        padding: 6px 8px;
        gap: 6px;
      }

      .control-btn {
        font-size: 14px;
        padding: 4px 6px;
      }

      .time-display {
        font-size: 12px;
        min-width: 40px;
      }

      .big-play-button {
        width: 70px;
        height: 70px;
        font-size: 28px;
      }
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
    .card-enter{animation:fadeUp 0.5s ease forwards;opacity:0}
    
    /* ========== 手机端改造：两列 + 缩窄间距 ========== */
    @media(max-width:768px){
      header{padding:16px 20px}
      nav{display:none}
      .search-wrap input{width:160px}
      /* 两侧间距由原来的20px改为12px，消除过宽黑边 */
      .filter-section,#media-section{padding-left:12px;padding-right:12px}
      #error-banner{margin:0 12px}
      /* 网格强制两列 */
      .media-grid{grid-template-columns:repeat(2,1fr);gap:2px}
      .hero-stats{gap:24px}
      .stat-num{font-size:1.5rem}
      .player-body{flex-direction:column}
      .player-main{max-height:60vh}
      .player-sidebar{width:100% !important;max-height:40vh !important;overflow-y:auto !important;border-left:none !important;border-top:1px solid rgba(201,168,76,0.12);display:flex !important}
      .episode-item{padding:12px 16px}
      .sidebar-section-title{padding:12px 16px}
    }
    @media (min-width:769px) and (max-width:1024px){.player-sidebar{width:260px}}
    @media (pointer:coarse){*{-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}input,textarea{-webkit-user-select:text}}
    body{padding-bottom:env(safe-area-inset-bottom)}::-webkit-scrollbar{display:none}
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1c">
  <link rel="apple-touch-icon" href="https://kingsleyqi.com/logo-192.png">
</head>
<body>

<header>
  <div class="logo"><span>Kingsley Qi</span> · Media</div>
  <nav id="main-nav"></nav>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="搜索媒体…" autocomplete="off"/>
    <span class="search-icon">⌕</span>
  </div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-lines"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Private Media Archive</p>
    <h1 class="hero-title">Your <em>World</em><br>of Media</h1>
    <p class="hero-sub">Powered by Cloudflare R2 · Streaming Everywhere</p>
    <div class="hero-stats" id="hero-stats"><div class="stat"><div class="stat-num">—</div><div class="stat-label">加载中</div></div></div>
  </div>
  <div class="scroll-cue">Scroll</div>
</section>

<div class="filter-section">
  <p class="filter-title">Browse Collection</p>
  <div class="filter-tabs" id="filter-tabs"></div>
</div>

<section id="media-section">
  <div class="section-header">
    <h2 class="section-title" id="section-title">所有媒体</h2>
    <span class="section-count" id="section-count"></span>
  </div>
  <div id="error-banner"></div>
  <div id="loading"><div class="loader"></div><p>Loading Archive…</p></div>
  <div class="media-grid" id="media-grid" style="display:none"></div>
</section>

<!-- Viewer Login Modal -->
<div id="viewer-login" style="position:fixed;inset:0;z-index:250;background:rgba(13,13,15,0.96);display:none;align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:420px;border:1px solid rgba(201,168,76,0.18);background:rgba(22,22,26,0.85);backdrop-filter:blur(12px);padding:26px 22px">
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;margin-bottom:6px;color:var(--cream)">Access Required</div>
    <div style="font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,232,216,0.35);margin-bottom:18px">KINGSLEY · MEDIA <span data-app-version></span></div>
    <div style="font-size:0.7rem;color:rgba(240,232,216,0.45);line-height:1.6;margin-bottom:14px">请输入访问密码后查看媒体内容。</div>
    <input id="viewer-pw" type="password" placeholder="访问密码…" autocomplete="current-password"
      style="width:100%;background:rgba(240,232,216,0.04);border:1px solid rgba(201,168,76,0.22);color:var(--cream);font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;padding:10px 12px;outline:none;border-radius:2px"/>
    <div id="viewer-pw-err" style="display:none;margin-top:10px;padding:10px 12px;background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.22);color:rgba(255,170,170,0.9);font-size:0.65rem;letter-spacing:0.06em"></div>
    <button id="viewer-login-btn" style="margin-top:12px;width:100%;background:var(--gold);color:var(--ink);border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:10px 12px">Unlock</button>
  </div>
</div>

<div id="player-modal">
  <div class="player-header">
    <div class="player-title-wrap">
      <div class="player-title" id="player-title">—</div>
      <div class="player-subtitle" id="player-subtitle"></div>
    </div>
    <button class="player-close" id="player-close">✕</button>
  </div>

      <div id="videojs-container" style="width:100%;height:100%;position:relative;">
        <!-- 大播放按钮将在这里插入 -->
        <!-- 进度条将在这里插入 -->
        <!-- 控制栏将在这里插入 -->
      </div>
    </div>
    <div class="player-sidebar" id="player-sidebar"></div>
  </div>
</div>

<script>
// ========================== 配置常量 ==========================
const CDN_BASE = 'https://cdn.kingsleyqi.com';
const API_URL = '/api/list';
const PROGRESS_KEY = 'mkm_progress';
const LAST_EP_KEY_PREFIX = 'last_ep_';

const BUILTIN = [
  { slug: 'movies', name: '电影', icon: '🎬' },
  { slug: 'tvshows', name: '电视剧', icon: '📺' },
  { slug: 'music', name: '音乐', icon: '🎵' },
];

let allItems = [];
let allCats = [];
let currentFilter = 'all';
let currentSearch = '';
let currentVideoJsPlayer = null;
let currentProgressKey = null;
let currentSaveTimer = null;
let isOpeningMedia = false;
let currentPlayingItemId = null;
const VIEWER_TOKEN_KEY = 'km_viewer_token';

// 控制栏状态
let hideControlsTimeout;
let controlsVisible = true;

// 播放模式
let playMode = 'sequential'; // 'sequential' 或 'shuffle'

// ========================== 辅助函数 ==========================
function getCat(slug) {
  return allCats.find(c => c.slug === slug) || BUILTIN.find(c => c.slug === slug) || { slug, name: slug, icon: '📁' };
}
function getProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); } catch { return {}; }
}
function saveProgress(key, pct) {
  if (!key) return;
  const p = getProgress();
  if (pct > 0 && pct < 99) p[key] = Math.round(pct);
  else if (pct >= 99) p[key] = 100;
  else if (pct === 0 && p[key]) delete p[key];
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}
function getLastEpisodeIndex(itemId) {
  try { const idx = localStorage.getItem(LAST_EP_KEY_PREFIX + itemId); return idx !== null ? parseInt(idx,10) : 0; } catch { return 0; }
}
function setLastEpisodeIndex(itemId, idx) {
  try { localStorage.setItem(LAST_EP_KEY_PREFIX + itemId, idx); } catch(e) {}
}
function showError(msg, isWarning = false) {
  const el = document.getElementById('error-banner');
  el.textContent = (isWarning ? '⚠️ ' : '❌ ') + msg;
  el.style.display = 'block';
  setTimeout(() => { if (el) el.style.display = 'none'; }, 5000);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getFullPosterUrl(poster) {
  if (!poster) return null;
  if (poster.startsWith('http') || poster.startsWith('/api/')) return poster;
  return `${CDN_BASE}/${poster}`;
}

function getPlayableUrl(u) {
  if (!u) return null;
  if (u.startsWith('/api/')) return u;
  if (u.startsWith('http')) return u;
  return `${CDN_BASE}/${u}`;
}

function formatTime(seconds) {
  if (isNaN(seconds)) return '00:00';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) {
    return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
  return `${m}:${String(s).padStart(2, '0')}`;
}

// ========================== 播放模式相关函数 ==========================
function playNextItem() {
  if (!currentPlayingItemId) return;

  const currentItem = allItems.find(i => i.id === currentPlayingItemId);
  if (!currentItem) return;

  // 如果是单集内容（电影或单首音乐），不自动播放下一首
  if (!currentItem.episodes || currentItem.episodes.length <= 1) return;

  const currentEpIndex = getLastEpisodeIndex(currentPlayingItemId);
  let nextEpIndex;

  if (playMode === 'shuffle') {
    // 随机播放：选择一个随机剧集，但不重复当前正在播放的
    const availableIndices = Array.from({length: currentItem.episodes.length}, (_, i) => i)
      .filter(i => i !== currentEpIndex);
    if (availableIndices.length > 0) {
      nextEpIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
    }
  } else {
    // 顺序播放：播放下一集，如果是最后一集则停止
    nextEpIndex = currentEpIndex + 1;
    if (nextEpIndex >= currentItem.episodes.length) {
      // 播放完毕，不自动播放
      return;
    }
  }

  if (nextEpIndex !== undefined && nextEpIndex >= 0 && nextEpIndex < currentItem.episodes.length) {
    playEpisode(currentPlayingItemId, nextEpIndex);
  }
}

// ========================== UI 构建与渲染 ==========================
function buildHeroStats() {
  const countMap = {};
  allItems.forEach(item => { countMap[item.type] = (countMap[item.type] || 0) + 1; });
  const ordered = allCats.filter(c => countMap[c.slug] > 0);
  const statsEl = document.getElementById('hero-stats');
  if (!ordered.length) {
    statsEl.innerHTML = `<div class="stat"><div class="stat-num">0</div><div class="stat-label">作品</div></div>`;
    return;
  }
  statsEl.innerHTML = ordered.map(cat => `<div class="stat"><div class="stat-num">${countMap[cat.slug]}</div><div class="stat-label">${cat.name}</div></div>`).join('');
}
function buildUI() {
  const seenSlugs = [...new Set(allItems.map(i => i.type))];
  const builtinOrdered = BUILTIN.filter(c => seenSlugs.includes(c.slug));
  const seen = new Set(builtinOrdered.map(c => c.slug));
  const customOrdered = allCats.filter(c => seenSlugs.includes(c.slug) && !seen.has(c.slug));
  const ordered = [...builtinOrdered, ...customOrdered];
  const tabsEl = document.getElementById('filter-tabs');
  tabsEl.innerHTML = `<button class="tab-btn active" data-filter="all">全部</button>` + ordered.map(c => `<button class="tab-btn" data-filter="${c.slug}">${c.icon || ''} ${c.name}</button>`).join('');
  tabsEl.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => setFilter(btn.dataset.filter); });
  const nav = document.getElementById('main-nav');
  nav.innerHTML = `<a href="#" data-filter="all" class="active">全部</a>` + ordered.slice(0,4).map(c => `<a href="#" data-filter="${c.slug}">${c.name}</a>`).join('');
  nav.querySelectorAll('a').forEach(a => { a.onclick = e => { e.preventDefault(); setFilter(a.dataset.filter); document.getElementById('media-section').scrollIntoView({ behavior: 'smooth' }); }; });
  syncActive();
  buildHeroStats();
}
function setFilter(slug) { currentFilter = slug; syncActive(); renderGrid(); }
function syncActive() {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
  document.querySelectorAll('#main-nav a').forEach(a => a.classList.toggle('active', a.dataset.filter === currentFilter));
}
function renderGrid() {
  const grid = document.getElementById('media-grid');
  const progress = getProgress();
  grid.style.display = 'grid';
  const filtered = allItems.filter(item => (currentFilter === 'all' || item.type === currentFilter) && (!currentSearch || item.name.toLowerCase().includes(currentSearch.toLowerCase())));
  const titleMap = { all: '所有媒体' };
  allCats.forEach(c => { titleMap[c.slug] = c.name; });
  document.getElementById('section-title').textContent = titleMap[currentFilter] || currentFilter;
  document.getElementById('section-count').textContent = `${filtered.length} 个作品`;
  if (!filtered.length) {
    const cat = getCat(currentFilter);
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">${cat.icon || '📭'}</div><div class="empty-text">${currentSearch ? '没有匹配的结果' : '此分类暂无内容'}</div><div class="empty-sub">${currentSearch ? 'Try a different keyword' : 'Add files to your R2 bucket'}</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map((item, i) => {
    const pct = progress[item.id] || 0;
    const cat = getCat(item.type);
    const posterUrl = item.poster ? getFullPosterUrl(item.poster) : null;
    const delay = Math.min(i*40,600);
    return `<div class="media-card card-enter" style="animation-delay:${delay}ms" data-id="${esc(item.id)}">
      ${posterUrl ? `<img class="card-poster" src="${posterUrl}" alt="${esc(item.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
      <div class="card-no-poster"${posterUrl ? ' style="display:none"' : ''}><div class="card-icon">${cat.icon}</div><div class="card-no-name">${esc(item.name)}</div></div>
      <div class="card-badge">${cat.name}</div>
      ${pct > 0 ? `<div class="card-progress-bar"><div class="card-progress-fill" style="width:${pct}%"></div></div>` : ''}
      <div class="card-overlay"><div class="card-name">${esc(item.name)}</div><div class="card-meta">${item.year || ''}${item.type === 'tvshows' && item.episodes && item.episodes.length ? ` · ${item.episodes.length} 集` : ''}</div><button class="card-play-btn">▶ 播放</button></div>
    </div>`;
  }).join('');
  if (!window._cardListenerAttached) {
    document.getElementById('media-grid').addEventListener('click', (e) => {
      const card = e.target.closest('.media-card');
      if (card && !e.target.closest('.card-play-btn')) {
        const id = card.getAttribute('data-id');
        if (id) openItem(id);
      } else if (e.target.closest('.card-play-btn')) {
        const card = e.target.closest('.media-card');
        if (card) {
          const id = card.getAttribute('data-id');
          if (id) openItem(id);
        }
        e.stopPropagation();
      }
    });
    window._cardListenerAttached = true;
  }
}
function renderEpisodesSidebar(item, activeEpIndex = 0) {
  const sidebar = document.getElementById('player-sidebar');
  if (!item.episodes || item.episodes.length === 0) {
    sidebar.style.display = 'none';
    sidebar.innerHTML = '';
    sidebar.removeEventListener('click', sidebarEpisodeHandler);
    return false;
  }
  sidebar.style.display = 'flex';
  sidebar.style.flexDirection = 'column';
  const progress = getProgress();
  const groups = groupEpisodesBySeason(item.episodes);
  const seasonKeys = Object.keys(groups).sort((a, b) => (groups[a]._sortKey ?? 9999) - (groups[b]._sortKey ?? 9999) || a.localeCompare(b, undefined, { numeric: true }));
  const listLabel = item.type === 'music' ? '播放列表' : '剧集列表';
  const itemLabel = item.type === 'music' ? '首' : '集';
  sidebar.innerHTML =
    `<div class="sidebar-section-title">${listLabel} · ${item.episodes.length}${itemLabel}</div>` +
    seasonKeys.map(season => {
      const eps = groups[season].episodes;
      const seasonTitle = season || 'Season';
      return `
        <div style="padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(201,168,76,0.55)">${esc(seasonTitle)}</div>
          <div style="font-size:0.55rem;letter-spacing:0.1em;color:rgba(240,232,216,0.28)">${eps.length} ${itemLabel}</div>
        </div>
        ${eps.map(({ ep, idx }) => {
          const pct = progress[ep.key] || 0;
          const isActive = idx === activeEpIndex;
          const numLabel = ep.episodeNumber != null ? String(ep.episodeNumber).padStart(2,'0') : String(idx + 1).padStart(2,'0');
          return `<div class="episode-item ${isActive ? 'active' : ''}" data-ep-index="${idx}">
            <div class="ep-num">${numLabel}</div>
            <div class="ep-info"><div class="ep-name">${esc(ep.name)}</div>${pct > 0 ? `<div class="ep-progress"><div class="ep-progress-fill" style="width:${pct}%"></div></div>` : ''}</div>
          </div>`;
        }).join('')}
      `;
    }).join('');
  sidebar.removeEventListener('click', sidebarEpisodeHandler);
  sidebar.addEventListener('click', sidebarEpisodeHandler);
  return true;
}
function sidebarEpisodeHandler(e) {
  const epItem = e.target.closest('.episode-item');
  if (epItem && currentPlayingItemId) {
    const idx = parseInt(epItem.getAttribute('data-ep-index'), 10);
    if (!isNaN(idx)) playEpisode(currentPlayingItemId, idx);
  }
}

// ========================== 自定义控制栏 ==========================
function createCustomControls(player) {
  const container = document.getElementById('videojs-container');
  
  // 创建进度条
  const progressBar = document.createElement('div');
  progressBar.className = 'progress-bar-container';
  progressBar.style.position = 'absolute';
  progressBar.style.bottom = '55px';
  progressBar.style.left = '0';
  progressBar.style.right = '0';
  progressBar.style.height = '4px';
  progressBar.style.background = 'rgba(255,255,255,0.2)';
  progressBar.style.cursor = 'pointer';
  progressBar.style.zIndex = '50';
  
  const progressFill = document.createElement('div');
  progressFill.className = 'progress-bar-fill';
  progressFill.style.height = '100%';
  progressFill.style.background = 'var(--gold)';
  progressFill.style.width = '0%';
  progressFill.style.transition = 'width 0.1s linear';
  progressBar.appendChild(progressFill);
  container.appendChild(progressBar);

  // 创建控制栏
  const controls = document.createElement('div');
  controls.className = 'custom-player-controls';
  controls.innerHTML = `
    <button class="control-btn" id="play-btn" title="播放/暂停">
      <i class="fas fa-play"></i>
    </button>
    <button class="control-btn" id="play-mode-btn" title="播放模式">
      <i class="fas fa-shuffle"></i>
    </button>
    <div class="volume-control">
      <button class="control-btn" id="volume-btn" title="静音">
        <i class="fas fa-volume-high"></i>
      </button>
      <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100">
    </div>
    <div class="time-display">
      <span id="current-time">00:00</span> / <span id="duration">00:00</span>
    </div>
    <div style="flex: 1;"></div>
    <button class="control-btn" id="fullscreen-btn" title="全屏">
      <i class="fas fa-expand"></i>
    </button>
  `;
  container.appendChild(controls);

  // 大播放按钮
  const bigPlayBtn = document.createElement('button');
  bigPlayBtn.className = 'big-play-button';
  bigPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
  container.appendChild(bigPlayBtn);

  // 事件绑定
  const playBtn = document.getElementById('play-btn');
  const playModeBtn = document.getElementById('play-mode-btn');
  const volumeBtn = document.getElementById('volume-btn');
  const volumeSlider = document.getElementById('volume-slider');
  const fullscreenBtn = document.getElementById('fullscreen-btn');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');

  // 初始化播放模式按钮
  function updatePlayModeButton() {
    playModeBtn.innerHTML = playMode === 'sequential' ? '<i class="fas fa-arrow-right"></i>' : '<i class="fas fa-shuffle"></i>';
    playModeBtn.title = playMode === 'sequential' ? '顺序播放' : '随机播放';
  }
  updatePlayModeButton();

  // 播放/暂停
  function togglePlay() {
    if (player.paused()) {
      player.play();
    } else {
      player.pause();
    }
  }

  playBtn.addEventListener('click', togglePlay);
  bigPlayBtn.addEventListener('click', togglePlay);

  // 播放模式切换
  playModeBtn.addEventListener('click', () => {
    playMode = playMode === 'sequential' ? 'shuffle' : 'sequential';
    updatePlayModeButton();
    // 保存播放模式到localStorage
    localStorage.setItem('player_play_mode', playMode);
  });

  // 加载保存的播放模式
  const savedPlayMode = localStorage.getItem('player_play_mode');
  if (savedPlayMode) {
    playMode = savedPlayMode;
    updatePlayModeButton();
  }

  // 音量控制
  volumeSlider.addEventListener('input', (e) => {
    player.volume(e.target.value / 100);
    updateVolumeButton();
  });

  volumeBtn.addEventListener('click', () => {
    player.muted(!player.muted());
    updateVolumeButton();
  });

  function updateVolumeButton() {
    const isMuted = player.muted();
    volumeBtn.innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-high"></i>';
  }

  // 全屏
  fullscreenBtn.addEventListener('click', () => {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.getElementById('player-main').requestFullscreen();
    }
  });

  // 进度条 - 点击和拖拽
  let isDragging = false;
  
  function updateProgress(e) {
    if (!player.duration()) return;
    
    const rect = progressBar.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();
    
    // 计算相对于进度条的位置
    let clientX = e.clientX;
    if (e.touches) {
      clientX = e.touches[0].clientX;
    }
    
    const x = clientX - rect.left;
    const percent = Math.max(0, Math.min(1, x / rect.width));
    
    const newTime = percent * player.duration();
    player.currentTime(newTime);
    progressFill.style.width = (percent * 100) + '%';
  }

  // 点击进度条
  progressBar.addEventListener('click', (e) => {
    updateProgress(e);
  });

  // 拖拽进度条
  progressBar.addEventListener('mousedown', (e) => {
    isDragging = true;
    updateProgress(e);
  });

  document.addEventListener('mousemove', (e) => {
    if (isDragging) {
      updateProgress(e);
    }
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // 触屏拖拽
  progressBar.addEventListener('touchstart', (e) => {
    isDragging = true;
    updateProgress(e);
  });

  document.addEventListener('touchmove', (e) => {
    if (isDragging) {
      updateProgress(e);
    }
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });

  // 更新进度条和时间
  player.on('timeupdate', () => {
    if (!isDragging) {
      const percent = (player.currentTime() / player.duration()) * 100;
      progressFill.style.width = percent + '%';
    }
    currentTimeEl.textContent = formatTime(player.currentTime());
  });

  player.on('loadedmetadata', () => {
    durationEl.textContent = formatTime(player.duration());
  });

  player.on('play', () => {
    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    bigPlayBtn.classList.add('hidden');
  });

  player.on('pause', () => {
    playBtn.innerHTML = '<i class="fas fa-play"></i>';
    if (!player.ended()) {
      bigPlayBtn.classList.remove('hidden');
    }
  });

  player.on('ended', () => {
    bigPlayBtn.classList.remove('hidden');
    // 自动播放下一首
    playNextItem();
  });

  // 显示/隐藏控制栏
  function showControls() {
    controls.classList.remove('hidden');
    progressBar.classList.remove('hidden');
    clearTimeout(hideControlsTimeout);
    hideControlsTimeout = setTimeout(() => {
      // 只有在播放状态且不是全屏暂停的情况下才隐藏
      if (!player.paused() && !document.fullscreenElement) {
        controls.classList.add('hidden');
        progressBar.classList.add('hidden');
      }
    }, 3000);
  }

  function hideControls() {
    controls.classList.add('hidden');
    progressBar.classList.add('hidden');
  }

  container.addEventListener('mousemove', showControls);
  container.addEventListener('mouseleave', hideControls);

  // 触摸设备 - 显示/隐藏控制栏
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) { // 单指触摸显示控制栏
      showControls();
    }
  });

  // 播放状态变化时控制显示
  player.on('play', () => {
    // 播放时延迟隐藏
    setTimeout(() => {
      if (!document.fullscreenElement) {
        hideControls();
      }
    }, 500);
  });

  player.on('pause', () => {
    // 暂停时显示控制栏
    showControls();
  });

  // 全屏状态变化
  document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
      // 进入全屏时显示控制栏
      showControls();
    } else {
      // 退出全屏时根据播放状态决定
      if (player.paused()) {
        showControls();
      } else {
        setTimeout(hideControls, 1000);
      }
    }
  });

  // ========================== 手势控制功能 ==========================
  let gestureStartX = 0;
  let gestureStartY = 0;
  let gestureStartTime = 0;
  let isGestureActive = false;
  let gestureType = ''; // 'progress', 'volume', 'brightness'
  let gestureStartValue = 0;

  // 创建手势提示元素
  const gestureHint = document.createElement('div');
  gestureHint.style.cssText = `
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 20px;
    border-radius: 10px;
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    text-align: center;
    z-index: 1000;
    display: none;
    pointer-events: none;
  `;
  container.appendChild(gestureHint);

  function showGestureHint(text) {
    gestureHint.textContent = text;
    gestureHint.style.display = 'block';
    clearTimeout(gestureHint.hideTimeout);
    gestureHint.hideTimeout = setTimeout(() => {
      gestureHint.style.display = 'none';
    }, 1000);
  }

  function updateGestureHint(type, value) {
    let text = '';
    switch (type) {
      case 'progress':
        text = `进度: ${formatTime(value)}`;
        break;
      case 'volume':
        text = `音量: ${Math.round(value * 100)}%`;
        break;
      case 'brightness':
        text = `亮度: ${Math.round(value * 100)}%`;
        break;
    }
    showGestureHint(text);
  }

  // 触摸开始
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      const touch = e.touches[0];
      gestureStartX = touch.clientX;
      gestureStartY = touch.clientY;
      gestureStartTime = Date.now();
      isGestureActive = false;
    }
  });

  // 触摸移动
  container.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;

    const touch = e.touches[0];
    const deltaX = touch.clientX - gestureStartX;
    const deltaY = touch.clientY - gestureStartY;
    const absDeltaX = Math.abs(deltaX);
    const absDeltaY = Math.abs(deltaY);

    // 如果移动距离太小，不认为是手势
    if (Math.max(absDeltaX, absDeltaY) < 30) return;

    if (!isGestureActive) {
      // 确定手势类型
      if (absDeltaX > absDeltaY) {
        // 水平移动 - 进度控制
        gestureType = 'progress';
        gestureStartValue = player.currentTime();
        showControls(); // 显示控制栏
      } else {
        // 垂直移动 - 根据屏幕位置决定音量或亮度
        const screenWidth = window.innerWidth;
        if (touch.clientX < screenWidth / 2) {
          // 左侧 - 亮度
          gestureType = 'brightness';
          gestureStartValue = getCurrentBrightness();
        } else {
          // 右侧 - 音量
          gestureType = 'volume';
          gestureStartValue = player.volume();
        }
      }
      isGestureActive = true;
    }

    // 执行手势
    if (gestureType === 'progress') {
      const duration = player.duration();
      if (duration) {
        const progressChange = (deltaX / window.innerWidth) * duration * 0.5; // 屏幕宽度对应视频时长的一半
        const newTime = Math.max(0, Math.min(duration, gestureStartValue + progressChange));
        updateGestureHint('progress', newTime);
      }
    } else if (gestureType === 'volume') {
      const volumeChange = (gestureStartY - touch.clientY) / window.innerHeight; // 上下滑动改变音量
      const newVolume = Math.max(0, Math.min(1, gestureStartValue + volumeChange));
      player.volume(newVolume);
      updateGestureHint('volume', newVolume);
    } else if (gestureType === 'brightness') {
      const brightnessChange = (gestureStartY - touch.clientY) / window.innerHeight;
      const newBrightness = Math.max(0.1, Math.min(1, gestureStartValue + brightnessChange));
      setBrightness(newBrightness);
      updateGestureHint('brightness', newBrightness);
    }
  });

  // 触摸结束
  container.addEventListener('touchend', (e) => {
    if (isGestureActive) {
      if (gestureType === 'progress') {
        // 应用进度变化
        const duration = player.duration();
        if (duration) {
          const progressChange = ((e.changedTouches[0].clientX - gestureStartX) / window.innerWidth) * duration * 0.5;
          const newTime = Math.max(0, Math.min(duration, gestureStartValue + progressChange));
          player.currentTime(newTime);
        }
      }
      // 音量和亮度在移动时已经实时应用
    }
    isGestureActive = false;
    gestureType = '';
  });

  // 亮度控制函数
  function getCurrentBrightness() {
    const videoElement = player.el().querySelector('video');
    return videoElement ? parseFloat(getComputedStyle(videoElement).filter.match(/brightness\(([^)]+)\)/)?.[1] || 1) : 1;
  }

  function setBrightness(value) {
    const videoElement = player.el().querySelector('video');
    if (videoElement) {
      videoElement.style.filter = `brightness(${value})`;
    }
  }

  return { progressBar, controls, bigPlayBtn };
}

// ========================== Video.js 播放器核心 ==========================
function destroyPlayer() {
  if (currentSaveTimer) { clearInterval(currentSaveTimer); currentSaveTimer = null; }
  if (currentVideoJsPlayer) {
    try { currentVideoJsPlayer.dispose(); } catch(e) { console.warn('dispose error', e); }
    currentVideoJsPlayer = null;
  }
  const container = document.getElementById('videojs-container');
  if (container) container.innerHTML = '';
  currentProgressKey = null;
}

function extractExtFromUrl(u) {
  const s = String(u || '');
  const clean = s.split('?')[0].split('#')[0];
  const directExt = (clean.split('.').pop() || '').toLowerCase();
  if (directExt && directExt !== clean.toLowerCase()) return directExt;
  try {
    const base = window.location.origin;
    const uo = new URL(s, base);
    const p = uo.searchParams.get('path') || '';
    const pClean = String(p).split('?')[0].split('#')[0];
    const ext = (pClean.split('.').pop() || '').toLowerCase();
    if (ext && ext !== pClean.toLowerCase()) return ext;
  } catch {}
  return '';
}

function isM3u8Url(u) {
  return extractExtFromUrl(u) === 'm3u8' || /\.m3u8(\?|#|$)/i.test(String(u || ''));
}

// B站 iframe 播放支持
function playWithIframe(url) {
  destroyPlayer();
  const container = document.getElementById('videojs-container');
  if (!container) return;

  // 保证自动播放、高清等参数
  const separator = url.includes('?') ? '&' : '?';
  const iframeUrl = url.includes('player.bilibili.com')
    ? `${url}${separator}as_wide=1&high_quality=1&autoplay=1`
    : url;

  container.innerHTML = `
    <iframe 
      src="${iframeUrl}" 
      style="width:100%;height:100%;border:none;" 
      allowfullscreen="true"
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"
      scrolling="no"
    ></iframe>
  `;

  const iframe = container.querySelector('iframe');
  iframe.addEventListener('error', () => {
    showError('B 站视频加载失败，可能被阻止或链接失效');
  });
}

async function playWithVideoJs(url, progressKey, posterUrl = null) {
  destroyPlayer();
  const container = document.getElementById('videojs-container');
  if (!container) throw new Error('播放器容器不存在');
  
  const videoEl = document.createElement('video');
  videoEl.id = 'videojs-player-' + Date.now();
  videoEl.className = 'vjs-default-skin';
  videoEl.setAttribute('preload', 'auto');
  videoEl.setAttribute('playsinline', 'true');
  videoEl.style.width = '100%';
  videoEl.style.height = '100%';
  if (posterUrl) videoEl.poster = posterUrl;
  container.appendChild(videoEl);
  
  const isM3u8 = isM3u8Url(url);
  const mimeType = guessMediaMime(url, isM3u8);
  
  const player = videojs(videoEl, {
    controls: false,
    autoplay: true,
    preload: 'auto',
    fluid: false,
    sources: [{
      src: url,
      type: mimeType || 'application/x-mpegURL'
    }]
  });
  
  currentVideoJsPlayer = player;
  currentProgressKey = progressKey;
  
  // 创建自定义控制栏
  createCustomControls(player);
  
  return new Promise((resolve, reject) => {
    let resolved = false;
    const timeout = setTimeout(() => {
      if (!resolved) reject(new Error('播放器初始化超时'));
    }, 15000);
    
    player.ready(() => {
      try {
        const savedPct = getProgress()[progressKey] || 0;
        if (savedPct > 2) {
          player.one('loadedmetadata', () => {
            const duration = player.duration();
            if (duration && duration > 0) {
              player.currentTime(duration * savedPct / 100);
            }
          });
        }
        
        if (currentSaveTimer) clearInterval(currentSaveTimer);
        currentSaveTimer = setInterval(() => {
          if (player && player.duration() && currentProgressKey && player.currentTime() > 0) {
            const pct = (player.currentTime() / player.duration()) * 100;
            if (pct > 1 && pct < 99) saveProgress(currentProgressKey, Math.round(pct));
            else if (pct >= 99) saveProgress(currentProgressKey, 100);
          }
        }, 5000);
        
        resolved = true;
        clearTimeout(timeout);
        resolve(player);
      } catch (err) {
        clearTimeout(timeout);
        reject(err);
      }
    });
    
    player.on('error', (e) => {
      clearTimeout(timeout);
      const ext = (String(url).split('?')[0].split('#')[0].split('.').pop() || '').toLowerCase();
      const extraHint = ext === 'mkv'
        ? '（提示：MKV 在很多浏览器上不兼容；建议转码为 MP4(H.264/AAC) 或 HLS(m3u8)。）'
        : '';
      reject(new Error(`播放器错误: ${e.message || '未知错误'}${extraHint}`));
    });
  });
}

function guessMediaMime(url, isM3u8 = false) {
  if (isM3u8) return 'application/x-mpegURL';
  const ext = extractExtFromUrl(url);
  if (ext === 'mp4' || ext === 'm4v') return 'video/mp4';
  if (ext === 'webm') return 'video/webm';
  if (ext === 'mov') return 'video/quicktime';
  if (ext === 'mkv') return 'video/x-matroska';
  if (ext === 'avi') return 'video/x-msvideo';
  if (ext === 'ts') return 'video/mp2t';
  if (ext === 'mp3') return 'audio/mpeg';
  if (ext === 'flac') return 'audio/flac';
  if (ext === 'aac') return 'audio/aac';
  if (ext === 'wav') return 'audio/wav';
  if (ext === 'm4a') return 'audio/mp4';
  return '';
}

// ========================== 媒体交互 ==========================
async function openItem(id) {
  if (isOpeningMedia) return;
  const item = allItems.find(i => i.id === id);
  if (!item) { showError('未找到媒体信息'); return; }
  
  isOpeningMedia = true;
  const clickedCard = document.querySelector(`.media-card[data-id="${id}"]`);
  if (clickedCard) clickedCard.classList.add('click-loading');
  const sidebar = document.getElementById('player-sidebar');
  if (sidebar) {
    sidebar.style.display = 'none';
    sidebar.innerHTML = '';
    sidebar.removeEventListener('click', sidebarEpisodeHandler);
  }
  
  try {
    currentPlayingItemId = id;
    const cat = getCat(item.type);
    document.getElementById('player-title').textContent = item.name;
    const hasEpisodes = item.episodes && item.episodes.length > 0;
    const posterFull = item.poster ? getFullPosterUrl(item.poster) : null;
    
    if (hasEpisodes) {
      let lastEpIdx = getLastEpisodeIndex(item.id);
      if (lastEpIdx >= item.episodes.length) lastEpIdx = 0;
      renderEpisodesSidebar(item, lastEpIdx);
      await playEpisodeInner(item, lastEpIdx);
    } else {
      document.getElementById('player-sidebar').style.display = 'none';
      let subtitle = [cat.name, item.year].filter(Boolean).join(' · ');
      if (item.type === 'music') subtitle = `🎵 ${subtitle}`;
      document.getElementById('player-subtitle').textContent = subtitle;
      if (item.url) {
        const url = getPlayableUrl(item.url);
        // 如果是 B 站链接，使用 iframe 播放
        if (url.includes('player.bilibili.com')) {
          playWithIframe(url);
        } else {
          await playWithVideoJs(url, item.id, posterFull);
        }
      } else {
        throw new Error('该媒体没有可播放的地址');
      }
    }
    document.getElementById('player-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch (err) {
    console.error('打开媒体失败', err);
    showError(`播放失败: ${err.message || '未知错误'}`);
  } finally {
    isOpeningMedia = false;
    if (clickedCard) clickedCard.classList.remove('click-loading');
  }
}

async function playEpisode(itemId, epIdx) {
  if (isOpeningMedia) return;
  const item = allItems.find(i => i.id === itemId);
  if (!item || !item.episodes || !item.episodes[epIdx]) return;
  isOpeningMedia = true;
  try {
    await playEpisodeInner(item, epIdx);
    const sidebar = document.getElementById('player-sidebar');
    if (sidebar) {
      sidebar.querySelectorAll('.episode-item').forEach((el, i) => {
        if (i === epIdx) el.classList.add('active');
        else el.classList.remove('active');
      });
    }
  } catch (err) {
    showError(`切换剧集失败: ${err.message}`);
  } finally {
    isOpeningMedia = false;
  }
}

async function playEpisodeInner(item, epIdx) {
  const ep = item.episodes[epIdx];
  const seasonText = ep.season ? ` · ${ep.season}` : '';
  const epNum = (ep.episodeNumber != null) ? `E${String(ep.episodeNumber).padStart(2,'0')}` : `第 ${epIdx+1} 集`;
  document.getElementById('player-subtitle').textContent = `${item.name}${seasonText} · ${epNum} · ${ep.name}`;
  setLastEpisodeIndex(item.id, epIdx);
  const url = getPlayableUrl(ep.url);
  // 剧集也支持 B 站链接
  if (url.includes('player.bilibili.com')) {
    playWithIframe(url);
  } else {
    const posterFull = item.poster ? getFullPosterUrl(item.poster) : null;
    await playWithVideoJs(url, ep.key, posterFull);
  }
}

function groupEpisodesBySeason(episodes) {
  const map = {};
  episodes.forEach((ep, idx) => {
    const season = ep.season || (ep.seasonNumber != null ? `Season ${String(ep.seasonNumber).padStart(2,'0')}` : 'Season 01');
    if (!map[season]) {
      map[season] = { episodes: [], _sortKey: ep.seasonNumber ?? seasonSortKey(season) };
    }
    map[season].episodes.push({ ep, idx });
  });
  return map;
}

function seasonSortKey(season) {
  const m = String(season || '').match(/season\s*(\d{1,2})/i);
  if (m) return parseInt(m[1], 10);
  return 9999;
}

function closePlayer() {
  destroyPlayer();
  const sidebar = document.getElementById('player-sidebar');
  if (sidebar) {
    sidebar.style.display = 'none';
    sidebar.innerHTML = '';
    sidebar.removeEventListener('click', sidebarEpisodeHandler);
  }
  document.getElementById('player-modal').classList.remove('open');
  document.body.style.overflow = '';
  renderGrid();
  currentPlayingItemId = null;
}

// ========================== 数据加载 ==========================
async function loadMedia() {
  try {
    const headers = {};
    const token = sessionStorage.getItem(VIEWER_TOKEN_KEY) || localStorage.getItem(VIEWER_TOKEN_KEY);
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API_URL, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allItems = (data.items || []).map(normalizeItem);
    const custom = data.categories || [];
    allCats = [...BUILTIN, ...custom.filter(c => !BUILTIN.find(b => b.slug === c.slug))];
    buildUI();
    renderGrid();
  } catch (err) {
    if ((err && /HTTP 401/.test(err.message || ''))) {
      openViewerLogin();
    } else {
      showError(`无法加载媒体库：${err.message}`, true);
    }
    allItems = [];
    allCats = [...BUILTIN];
    buildUI();
    renderGrid();
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function normalizeItem(item) {
  const it = item || {};
  if (it.type === 'tvshows' && Array.isArray(it.episodes)) {
    it.episodes = [...it.episodes].sort((a, b) => {
      const as = (a?.seasonNumber ?? null);
      const bs = (b?.seasonNumber ?? null);
      if (as != null && bs != null && as !== bs) return as - bs;
      const ae = (a?.episodeNumber ?? null);
      const be = (b?.episodeNumber ?? null);
      if (ae != null && be != null && ae !== be) return ae - be;
      const ak = String(a?.key || a?.name || '');
      const bk = String(b?.key || b?.name || '');
      return ak.localeCompare(bk, undefined, { numeric: true, sensitivity: 'base' });
    });
  }
  return it;
}

function openViewerLogin() {
  const wrap = document.getElementById('viewer-login');
  if (!wrap) return;
  wrap.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  const inp = document.getElementById('viewer-pw');
  const err = document.getElementById('viewer-pw-err');
  const btn = document.getElementById('viewer-login-btn');
  if (err) err.style.display = 'none';
  if (inp) setTimeout(() => inp.focus(), 50);
  async function submit() {
    const pw = (inp?.value || '').trim();
    if (!pw) return;
    btn.disabled = true;
    btn.textContent = 'Unlocking…';
    try {
      const res = await fetch('/api/viewer/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.token) {
        if (err) {
          err.textContent = data.error || '密码错误';
          err.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Unlock';
        return;
      }
      sessionStorage.setItem(VIEWER_TOKEN_KEY, data.token);
      wrap.style.display = 'none';
      document.body.style.overflow = '';
      await loadMedia();
    } catch (e) {
      if (err) { err.textContent = e.message || '请求失败'; err.style.display = 'block'; }
      btn.disabled = false;
      btn.textContent = 'Unlock';
    }
  }
  if (btn) btn.onclick = submit;
  if (inp) inp.onkeydown = e => { if (e.key === 'Enter') submit(); };
}

// ========================== 事件绑定 ==========================
document.getElementById('player-close').onclick = closePlayer;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });
let searchTimer;
document.getElementById('search-input').oninput = e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentSearch = e.target.value.trim(); renderGrid(); }, 250);
};

loadMedia();
