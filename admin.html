<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Kingsley Media v1.3.0</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c0f;--surface:#111318;--border:#1e2230;--border2:#2a2f42;--accent:#4f9cf9;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;overflow-x:hidden}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(79,156,249,0.06),transparent)}
    .login-box{width:360px;background:var(--surface);border:1px solid var(--border2);padding:40px}
    .login-logo{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:32px}
    .login-title{font-size:1.4rem;font-weight:300;margin-bottom:8px}
    .login-sub{font-family:var(--mono);font-size:0.65rem;color:var(--muted);margin-bottom:32px}
    .field{margin-bottom:16px}
    .field label{display:block;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.85rem;padding:10px 14px;outline:none;transition:border-color 0.2s}
    .field input:focus,.field select:focus{border-color:var(--accent)}
    .btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--mono);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.2s;margin-top:8px}
    .btn-primary:hover{background:var(--accent2)}
    #app{display:none;min-height:100vh;flex-direction:column}
    #app.visible{display:flex}
    .topbar{height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);z-index:100}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .topbar-logo{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent)}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px}
    .status-dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
    .status-dot.offline{background:var(--red)}
    .main{flex:1;display:flex;overflow:hidden}
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto}
    .nav-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:0.85rem;color:var(--muted);transition:0.2s;border-left:3px solid transparent}
    .nav-item:hover{color:var(--text);background:rgba(79,156,249,0.05)}
    .nav-item.active{color:var(--accent);background:rgba(79,156,249,0.1);border-left-color:var(--accent)}
    .content{flex:1;overflow-y:auto;padding:24px;background:#0d0f14}
    .panel{background:var(--surface);border:1px solid var(--border);margin-bottom:24px;border-radius:2px}
    .panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .panel-title{font-family:var(--mono);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase}
    .panel-body{padding:20px}
    /* 修正返回上一级 UI Bug */
    .tree-back-container { overflow: hidden; margin-bottom: 8px; border: 1px solid var(--border2); background: rgba(255,255,255,0.02); }
    .tree-node{display:flex;align-items:center;padding:8px 12px;gap:12px;border-bottom:1px solid var(--border2);transition:0.15s}
    .tree-node:hover{background:rgba(79,156,249,0.05)}
    .action-btn{padding:4px 10px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:0.65rem;cursor:pointer;transition:0.2s}
    .action-btn:hover{border-color:var(--accent);color:var(--accent)}
    .action-btn.del:hover{border-color:var(--red);color:var(--red)}
    .transcode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
    .status-card{padding:16px;background:var(--bg);border:1px solid var(--border2)}
    .progress-wrap{height:4px;background:var(--border2);margin-top:12px;position:relative}
    .progress-bar{height:100%;background:var(--accent);width:0%;transition:width 0.4s}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-content{background:var(--surface);border:1px solid var(--border);width:600px;max-width:100%;max-height:80vh;overflow-y:auto;padding:24px}
    @media(max-width:768px){.sidebar{display:none}.topbar{padding:0 12px}}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">KM · Media Control</div>
    <h1 class="login-title">管理身份验证</h1>
    <p class="login-sub">// PRODUCTION READY ENGINE</p>
    <div class="field"><label>管理密钥</label><input type="password" id="pw-input" placeholder="Enter Token"/></div>
    <button class="btn-primary" id="login-btn">验证并进入</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">KM · ADMIN</div>
      <div style="margin-left:24px;display:flex;gap:16px;font-family:var(--mono);font-size:0.6rem;color:var(--muted)">
        <span>ALIST: <span id="alist-status" class="status-dot"></span></span>
        <span>TRANSCODE: <span id="tc-status" class="status-dot"></span></span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="action-btn" onclick="location.reload()">刷新环境</button>
      <button class="action-btn del" id="logout-btn">退出</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" data-page="media"><span class="nav-icon">🎬</span> 媒体与批量识别</div>
      <div class="nav-item" data-page="alist"><span class="nav-icon">☁️</span> Alist 网盘库</div>
      <div class="nav-item" data-page="transcode"><span class="nav-icon">⚙️</span> 转码队列监控</div>
      <div class="nav-item" data-page="files"><span class="nav-icon">📁</span> R2 存储管理</div>
    </div>

    <div class="content">
      <div id="page-media" class="page">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">批量媒体导入与识别</span></div>
          <div class="panel-body">
            <div class="field">
              <label>目标目录 (精细化识别：识别至文件夹上一层)</label>
              <input type="text" id="batch-path" placeholder="media/tvshows/YourTitle/Season 1/" class="field" />
            </div>
            <div style="display:flex;gap:10px">
              <button class="btn-primary" style="flex:1" onclick="previewBatch()">预览识别列表</button>
              <button class="btn-primary" style="flex:1;background:var(--green)" onclick="submitBatch()">执行批量入库</button>
            </div>
          </div>
        </div>
        <div id="batch-preview-area" class="panel" style="display:none">
           <div class="panel-header"><span class="panel-title">待添加项预览</span></div>
           <div class="panel-body" id="batch-preview-list" style="font-family:var(--mono);font-size:0.75rem"></div>
        </div>
      </div>

      <div id="page-alist" class="page" style="display:none">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">网盘文件浏览器</span>
            <span id="current-path-display" style="font-family:var(--mono);font-size:0.7rem;color:var(--accent)">/</span>
          </div>
          <div class="panel-body">
            <div id="alist-tree-container">
              <div class="tree-back-container" id="back-btn-box" style="display:none">
                <button class="action-btn" style="width:100%;text-align:left;border:none" onclick="goBackAlist()">⬅ 返回上一级 (PARENT DIRECTORY)</button>
              </div>
              <div id="alist-list"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="page-transcode" class="page" style="display:none">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">转码引擎状态监控</span></div>
          <div class="panel-body">
             <div class="transcode-grid">
                <div class="status-card">
                  <div style="color:var(--muted);font-size:0.6rem">节点负载</div>
                  <div style="font-size:1.2rem;font-family:var(--mono)" id="tc-load">0.00%</div>
                </div>
                <div class="status-card">
                  <div style="color:var(--muted);font-size:0.6rem">等待队列</div>
                  <div style="font-size:1.2rem;font-family:var(--mono)" id="tc-queue">0</div>
                </div>
                <div class="status-card">
                  <div style="color:var(--muted);font-size:0.6rem">输出目标</div>
                  <select id="tc-output-target" class="field" style="margin-top:5px;padding:4px">
                    <option value="r2">R2 存储</option>
                    <option value="alist">Alist 目录</option>
                    <option value="baidu">百度网盘</option>
                    <option value="local">服务器本地</option>
                  </select>
                </div>
             </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">活跃转码任务</span></div>
          <div class="panel-body" id="transcode-list">
             <p class="hint">暂无正在运行的任务</p>
          </div>
        </div>
      </div>

      <div id="page-files" class="page" style="display:none">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">R2 Storage</span></div>
          <div class="panel-body" id="r2-list"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--surface);border:1px solid var(--accent);display:none;z-index:2000;font-family:var(--mono);font-size:0.75rem"></div>

<script>
let CURRENT_AUTH = localStorage.getItem('km_admin_pw') || '';
let alistPath = '/';
let batchItems = [];

// 初始化
document.getElementById('login-btn').onclick = () => {
  const pw = document.getElementById('pw-input').value;
  if(pw) {
    CURRENT_AUTH = pw;
    localStorage.setItem('km_admin_pw', pw);
    checkAccess();
  }
};

async function checkAccess() {
  if(!CURRENT_AUTH) return;
  // 模拟 API 验证逻辑
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  initHeartbeat();
  loadAlist('/');
}

// 侧边栏切换
document.querySelectorAll('.nav-item').forEach(item => {
  item.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('page-' + item.dataset.page).style.display = 'block';
  };
});

// 心跳监控：网盘与转码服务器
async function initHeartbeat() {
  const check = async () => {
    try {
      const tcRes = await fetch('/api/transcode/status', { headers: {'Auth': CURRENT_AUTH} });
      const alistRes = await fetch('/api/alist/status', { headers: {'Auth': CURRENT_AUTH} });
      
      document.getElementById('alist-status').className = alistRes.ok ? 'status-dot online' : 'status-dot offline';
      document.getElementById('tc-status').className = tcRes.ok ? 'status-dot online' : 'status-dot offline';
      
      if(tcRes.ok) {
        const data = await tcRes.json();
        document.getElementById('tc-load').innerText = data.cpu_usage + '%';
        document.getElementById('tc-queue').innerText = data.queue_count;
        renderTranscodeTasks(data.tasks);
      }
    } catch(e) {
      console.warn("Heartbeat failed");
    }
  };
  check();
  setInterval(check, 5000);
}

// 网盘逻辑重构
async function loadAlist(path) {
  alistPath = path;
  const listEl = document.getElementById('alist-list');
  document.getElementById('current-path-display').innerText = path;
  document.getElementById('back-btn-box').style.display = path === '/' ? 'none' : 'block';
  
  listEl.innerHTML = '<p class="hint">正在连接网盘存储...</p>';
  try {
    const res = await fetch(`/api/alist/list?path=${encodeURIComponent(path)}`, { headers: {'Auth': CURRENT_AUTH} });
    const files = await res.json();
    
    let html = '';
    files.forEach(f => {
      const icon = f.is_dir ? '📁' : '📄';
      const action = f.is_dir ? `loadAlist('${path + (path.endsWith('/')?'':'/') + f.name}')` : `addAlistMedia('${f.url}')`;
      html += `
        <div class="tree-node">
          <span style="flex:1;cursor:pointer" onclick="${action}">${icon} ${f.name}</span>
          <span style="font-size:0.6rem;color:var(--muted)">${f.size || ''}</span>
          ${!f.is_dir ? `<button class="action-btn" onclick="triggerTranscode('${f.url}')">转码</button>` : ''}
        </div>`;
    });
    listEl.innerHTML = html || '<p class="hint">此目录为空</p>';
  } catch(e) {
    listEl.innerHTML = '<p class="hint" style="color:var(--red)">无法加载网盘数据，请检查 Alist 配置</p>';
  }
}

function goBackAlist() {
  const parts = alistPath.split('/').filter(Boolean);
  parts.pop();
  loadAlist('/' + parts.join('/'));
}

// 批量识别优化
async function previewBatch() {
  const path = document.getElementById('batch-path').value;
  if(!path) return showToast("请输入目标路径", true);
  
  const res = await fetch(`/api/media/scan?path=${encodeURIComponent(path)}`, { headers: {'Auth': CURRENT_AUTH} });
  batchItems = await res.json();
  
  const area = document.getElementById('batch-preview-area');
  const list = document.getElementById('batch-preview-list');
  area.style.display = 'block';
  list.innerHTML = batchItems.map(item => `
    <div style="padding:4px 0;border-bottom:1px solid var(--border2)">
      [${item.type}] ${item.title} -> <span style="color:var(--accent)">${item.file_path}</span>
    </div>
  `).join('');
}

async function submitBatch() {
  if(batchItems.length === 0) return showToast("请先预览识别结果", true);
  
  showToast("正在批量入库并获取直链...");
  const res = await fetch('/api/media/batch-add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Auth': CURRENT_AUTH},
    body: JSON.stringify({ items: batchItems })
  });
  
  if(res.ok) {
    showToast("批量添加成功，已排除内部 R2 标记");
    batchItems = [];
    document.getElementById('batch-preview-area').style.display = 'none';
  }
}

function renderTranscodeTasks(tasks) {
  const container = document.getElementById('transcode-list');
  if(!tasks || tasks.length === 0) {
    container.innerHTML = '<p class="hint">暂无活跃任务</p>';
    return;
  }
  container.innerHTML = tasks.map(t => `
    <div class="status-card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:0.75rem">${t.filename}</span>
        <span style="color:var(--accent);font-family:var(--mono)">${t.progress}%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${t.progress}%"></div></div>
      <div style="margin-top:8px;font-size:0.6rem;color:var(--muted)">目标：${t.output_path}</div>
    </div>
  `).join('');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  t.style.borderColor = isError ? 'var(--red)' : 'var(--accent)';
  setTimeout(() => t.style.display = 'none', 3000);
}

if(CURRENT_AUTH) checkAccess();
</script>
</body>
</html>
