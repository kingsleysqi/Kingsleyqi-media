<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Upload</title>
<style>
/* ---------- 保留你原来的样式 ---------- */
body { font-family: sans-serif; margin: 0; padding: 0; background:#f7f7f7; }
.container { max-width:900px;margin:auto;padding:20px; }
h1 { text-align:center; }
.file-list { margin-top:20px; }
.file-item { display:flex; justify-content:space-between; padding:5px 10px; background:#fff; margin-bottom:5px; border-radius:4px; }
.progress { width:100%; height:6px; background:#eee; border-radius:3px; overflow:hidden; margin-top:5px; }
.progress-bar { height:100%; width:0; background:#4caf50; transition: width 0.2s; }
</style>
</head>
<body>
<div class="container">
  <h1>Admin Upload</h1>
  <input type="file" id="fileInput" multiple>
  <div class="file-list" id="fileList"></div>
</div>

<script>
/* ---------- 核心上传逻辑 ---------- */

const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');

fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files);
  files.forEach(uploadFile);
});

async function uploadFile(file) {
  const li = document.createElement('div');
  li.className = 'file-item';
  li.innerHTML = `
    <span>${file.name}</span>
    <div class="progress"><div class="progress-bar"></div></div>
  `;
  fileList.appendChild(li);

  const progressBar = li.querySelector('.progress-bar');

  try {
    // 1️⃣ 请求上传 URL
    const key = file.name.startsWith('drive/') || file.name.startsWith('media/') 
                ? file.name 
                : 'media/' + file.name;  // ❗ 注意这里不要 encodeURIComponent
    const res = await fetch('/api/admin/upload-url', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ key, contentType: file.type })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    const uploadUrl = data.url;

    // 2️⃣ 直接 PUT 文件
    await fetch(uploadUrl, {
      method:'PUT',
      body: file // ❌ 不要自己加 Content-Type，签名已经处理
    });

    progressBar.style.width = '100%';
    li.style.background = '#e0ffe0';
  } catch(err) {
    console.error(err);
    li.style.background = '#ffe0e0';
    li.querySelector('.progress-bar').style.background = '#f44336';
  }
}

/* ---------- 拖拽上传 ---------- */
document.body.addEventListener('dragover', e => { e.preventDefault(); });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  files.forEach(uploadFile);
});
</script>
</body>
</html>
