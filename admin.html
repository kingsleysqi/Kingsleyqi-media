<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>管理控制台 · Kingsley Media</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08090a;--surface:#111318;--surface-lighter:#1a1d24;--border:#262a33;--accent:#3b82f6;--accent-glow:rgba(59,130,246,0.5);--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--text:#e2e8f0;--muted:#808d9e;--font-mono:'IBM Plex Mono',monospace;--font-sans:'IBM Plex Sans',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.5;overflow:hidden}
    
    /* 登录图层 */
    #login-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
    .login-card{width:340px;padding:40px;background:var(--surface);border:1px solid var(--border);box-shadow:0 20px 50px rgba(0,0,0,0.5)}
    .brand-logo{font-family:var(--font-mono);color:var(--accent);font-size:0.85rem;letter-spacing:0.3em;margin-bottom:8px;text-align:center}
    .version-tag{display:block;text-align:center;font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);margin-bottom:24px;letter-spacing:0.1em}
    
    /* 核心布局 */
    .layout{display:grid;grid-template-columns:240px 1fr;height:100vh}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;transition: transform 0.3s ease;z-index:1001}
    .main-content{display:flex;flex-direction:column;overflow:hidden;background:radial-gradient(circle at 50% 0%, #161920, #08090a)}
    .header{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
    .scroll-area{flex:1;overflow-y:auto;padding:20px}

    /* 移动端侧边栏开关 */
    .menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;margin-right:12px}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1000;display:none;backdrop-filter:blur(2px)}

    /* 导航 */
    .nav-group{margin-bottom:24px}
    .nav-label{padding:0 20px 8px;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--font-mono)}
    .nav-link{padding:12px 20px;display:flex;align-items:center;gap:12px;color:var(--muted);text-decoration:none;transition:0.2s;border-left:3px solid transparent}
    .nav-link:hover{background:rgba(255,255,255,0.03);color:var(--text)}
    .nav-link.active{color:var(--accent);background:rgba(59,130,246,0.08);border-left-color:var(--accent)}

    /* 组件样式 */
    .card{background:var(--surface);border:1px solid var(--border);margin-bottom:20px}
    .card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:0.8rem;font-weight:500;color:var(--text)}
    .card-body{padding:18px}
    
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .stat-item{background:var(--surface-lighter);padding:18px;border:1px solid var(--border)}
    .stat-val{font-size:1.6rem;font-weight:600;font-family:var(--font-mono);color:var(--accent)}
    .stat-lab{font-size:0.7rem;color:var(--muted);margin-top:4px}

    /* 按钮与表单 */
    .btn{padding:8px 16px;font-size:0.75rem;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:0.2s}
    .btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn:disabled{opacity:0.3;cursor:not-allowed}
    .input{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px 14px;color:var(--text);font-size:0.85rem;outline:none}
    .input:focus{border-color:var(--accent)}

    /* 数据表格 */
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{text-align:left;padding:12px;font-size:0.7rem;color:var(--muted);border-bottom:1px solid var(--border)}
    .data-table td{padding:12px;border-bottom:1px solid var(--border);font-size:0.85rem}
    
    .status-indicator{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.65rem}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
    .dot-success{background:var(--success);box-shadow:0 0 8px var(--success)}
    
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;background:var(--surface-lighter);border:1px solid var(--accent);color:var(--text);font-size:0.8rem;z-index:2000;display:none}
    .readonly-banner{background:var(--warning);color:#000;font-size:0.7rem;text-align:center;padding:4px;display:none;font-weight:600}

    /* 响应式适配 */
    @media (max-width: 768px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { 
            position: fixed; 
            left: 0; top: 0; bottom: 0; 
            width: 260px; 
            transform: translateX(-100%); 
        }
        .sidebar.active { transform: translateX(0); }
        .sidebar-overlay.active { display: block; }
        .menu-toggle { display: block; }
        .header { padding: 0 15px; }
        .stats-grid { grid-template-columns: 1fr 1fr; }
        .data-table th:nth-child(2), .data-table td:nth-child(2) { display: none; } /* 移动端隐藏大小列 */
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div class="brand-logo">媒体库后台系统</div>
    <div class="version-tag">版本号 <span data-version>--</span></div>
    <div style="margin-bottom:12px"><input type="password" id="auth-token" class="input" placeholder="输入管理密码"/></div>
    <button class="btn btn-primary" style="width:100%; margin-bottom:12px" onclick="App.authenticate()">登录系统</button>
    <button class="btn" style="width:100%; border-style:dashed" onclick="App.enterGuestMode()">免登录测试</button>
  </div>
</div>

<div class="readonly-banner" id="guest-banner">当前为：只读预览模式（部分修改功能已禁用）</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="UI.toggleMenu(false)"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="nav-group">
      <div class="nav-label">核心控制</div>
      <a href="#overview" class="nav-link active" onclick="UI.toggleMenu(false)"><span>📊</span> 系统概览</a>
      <a href="#transcode" class="nav-link" onclick="UI.toggleMenu(false)"><span>⚙️</span> 转码任务</a>
    </div>
    <div class="nav-group">
      <div class="nav-label">资源管理</div>
      <a href="#storage" class="nav-link" onclick="UI.toggleMenu(false)"><span>📁</span> 资源浏览</a>
      <a href="#media" class="nav-link" onclick="UI.toggleMenu(false)"><span>🎬</span> 批量入库</a>
    </div>
    <div style="margin-top:auto; padding: 0 20px">
        <div style="font-family:var(--font-mono); font-size:0.55rem; color:var(--muted); margin-bottom:12px">编译版本: <span data-version>--</span></div>
        <a href="javascript:App.logout()" class="nav-link" style="padding:12px 0; color:var(--danger)"><span>🚪</span> 退出登录</a>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div style="display:flex; align-items:center">
        <button class="menu-toggle" onclick="UI.toggleMenu(true)">☰</button>
        <div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--muted)">当前位置: <span id="current-route" style="color:var(--accent)">/系统概览</span></div>
      </div>
      <div style="display:flex;gap:15px">
        <div class="status-indicator">云盘: <span class="dot" id="dot-alist"></span></div>
        <div class="status-indicator">节点: <span class="dot" id="dot-node"></span></div>
      </div>
    </header>

    <div class="scroll-area">
      <section id="section-overview" class="route-section">
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-val" id="count-total">0</div><div class="stat-lab">媒体总数</div></div>
          <div class="stat-item"><div class="stat-val" id="count-queue">0</div><div class="stat-lab">队列任务</div></div>
        </div>
        <div class="card">
            <div class="card-header"><span class="card-title">系统信息</span></div>
            <div class="card-body" style="font-size:0.8rem; line-height:2">
                <p>后端架构: Serverless + Cloudflare R2</p>
                <p>网盘挂载: Alist API 兼容模式</p>
                <p>前端版本: <span data-version>--</span></p>
                <p>服务状态: <span style="color:var(--success)">运行中</span></p>
            </div>
        </div>
      </section>

      <section id="section-transcode" class="route-section" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title">转码任务监控</span>
            <button class="btn btn-primary" onclick="Transcoder.refresh()">同步队列</button>
          </div>
          <div class="card-body" id="transcode-tasks"></div>
        </div>
      </section>

      <section id="section-storage" class="route-section" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title">存储空间浏览器</span>
            <button class="btn btn-primary write-op" onclick="Browser.openUpload()">上传文件</button>
          </div>
          <div class="card-body" style="padding:0">
            <div id="breadcrumb" style="padding:10px 18px;background:rgba(0,0,0,0.2);font-family:var(--font-mono);font-size:0.65rem">/根目录</div>
            <table class="data-table">
              <thead><tr><th>名称</th><th>大小</th><th>操作</th></tr></thead>
              <tbody id="file-list"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="section-media" class="route-section" style="display:none">
        <div class="card">
          <div class="card-header"><span class="card-title">自动识别与入库</span></div>
          <div class="card-body">
            <div style="display:flex;gap:10px;margin-bottom:15px">
              <input type="text" id="scan-path" class="input" placeholder="输入待扫描的目录路径..."/>
              <button class="btn btn-primary" onclick="Media.scan()">开始扫描</button>
            </div>
            <div id="scan-preview" style="display:none">
                <table class="data-table"><tbody id="scan-list"></tbody></table>
                <div style="margin-top:15px;text-align:right">
                    <button class="btn btn-primary write-op" onclick="Media.commit()">确认批量添加</button>
                </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
/**
 * 配置与版本管理
 */
const CONFIG = {
    VERSION: "1.5.0-CN",
    API_BASE: "/api"
};

const App = {
    token: localStorage.getItem('km_token'),
    isReadOnly: false,
    
    init() {
        document.querySelectorAll('[data-version]').forEach(el => el.innerText = CONFIG.VERSION);
        if(this.token) this.checkAuth();
        window.onhashchange = () => this.router();
        this.router();
        this.heartbeat();
    },

    enterGuestMode() {
        this.isReadOnly = true;
        this.token = "GUEST_TOKEN";
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('guest-banner').style.display = 'block';
        UI.toast("进入测试模式：所有写入功能已禁用");
        document.querySelectorAll('.write-op').forEach(btn => btn.disabled = true);
        this.router();
    },

    authenticate() {
        const val = document.getElementById('auth-token').value;
        if(!val) return UI.toast("请输入管理密码", true);
        this.token = val;
        localStorage.setItem('km_token', val);
        this.isReadOnly = false;
        this.checkAuth();
    },

    async checkAuth() {
        if(this.isReadOnly) return;
        try {
            const res = await fetch(`${CONFIG.API_BASE}/auth/verify`, { headers: {'Auth': this.token} });
            if(res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                this.router();
            } else { this.logout(); }
        } catch(e) { this.logout(); }
    },

    logout() {
        localStorage.removeItem('km_token');
        location.reload();
    },

    router() {
        const hash = location.hash.replace('#', '') || 'overview';
        document.querySelectorAll('.route-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        const target = document.getElementById(`section-${hash}`);
        if(target) {
            target.style.display = 'block';
            const nav = document.querySelector(`.nav-link[href="#${hash}"]`);
            if(nav) nav.classList.add('active');
            
            const titles = { 'overview':'/系统概览', 'transcode':'/转码任务', 'storage':'/资源浏览', 'media':'/批量入库' };
            document.getElementById('current-route').innerText = titles[hash] || '/未知';
        }
    },

    heartbeat() {
        const ping = async () => {
            try {
                const res = await fetch(`${CONFIG.API_BASE}/system/status`, { headers: {'Auth': this.token} });
                const data = await res.json();
                UI.updateStatus('alist', data.alist_online);
                UI.updateStatus('node', data.node_ready);
                document.getElementById('count-total').innerText = data.media_count || 0;
                document.getElementById('count-queue').innerText = data.queue_count || 0;
            } catch(e) {}
        };
        ping();
        setInterval(ping, 15000);
    }
};

const UI = {
    toast(msg, err = false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        t.style.borderColor = err ? 'var(--danger)' : 'var(--accent)';
        setTimeout(() => t.style.display = 'none', 3000);
    },
    updateStatus(id, online) {
        const el = document.getElementById(`dot-${id}`);
        if(el) el.className = online ? 'dot dot-success' : 'dot';
    },
    toggleMenu(show) {
        document.getElementById('sidebar').classList.toggle('active', show);
        document.getElementById('sidebar-overlay').classList.toggle('active', show);
    }
};

const Transcoder = {
    async refresh() {
        const container = document.getElementById('transcode-tasks');
        container.innerHTML = '<div class="stat-lab">正在同步任务列表...</div>';
        try {
            const res = await fetch(`${CONFIG.API_BASE}/transcode/list`, { headers: {'Auth': App.token} });
            const tasks = await res.json();
            container.innerHTML = tasks.length ? tasks.map(t => `
                <div class="stat-item" style="margin-bottom:10px">
                    <div style="display:flex;justify-content:space-between;font-size:0.75rem">
                        <span>${t.name}</span><span>已完成 ${t.progress}%</span>
                    </div>
                </div>
            `).join('') : '<div class="stat-lab">当前无活动任务</div>';
        } catch(e) {}
    }
};

const Browser = {
    async load(path) {
        const list = document.getElementById('file-list');
        list.innerHTML = '<tr><td colspan="3" class="stat-lab">加载中...</td></tr>';
        try {
            const res = await fetch(`${CONFIG.API_BASE}/storage/list?path=${encodeURIComponent(path)}`, { headers: {'Auth': App.token} });
            const files = await res.json();
            list.innerHTML = files.map(f => `
                <tr class="tr-hover">
                    <td>${f.isDir?'📁':'📄'} ${f.name}</td>
                    <td class="stat-lab">${f.size}</td>
                    <td><button class="btn write-op" ${App.isReadOnly?'disabled':''}>操作</button></td>
                </tr>
            `).join('');
        } catch(e) {}
    },
    openUpload() {
        if(App.isReadOnly) return UI.toast("权限不足：演示模式无法上传", true);
        alert("上传功能已触发");
    }
};

const Media = {
    async scan() { UI.toast("正在扫描结构并匹配元数据..."); },
    async commit() { if(App.isReadOnly) UI.toast("测试模式不可写入数据", true); }
};

App.init();
</script>
</body>
</html>
