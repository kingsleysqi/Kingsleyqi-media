<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Kingsley Media</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c0f;--surface:#111318;--border:#1e2230;--border2:#2a2f42;--accent:#4f9cf9;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(79,156,249,0.06),transparent)}
    .login-box{width:360px;background:var(--surface);border:1px solid var(--border2);padding:40px}
    .login-logo{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:32px}
    .login-title{font-size:1.4rem;font-weight:300;margin-bottom:8px}
    .login-sub{font-family:var(--mono);font-size:0.65rem;color:var(--muted);margin-bottom:32px}
    .field{margin-bottom:16px}
    .field label{display:block;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.85rem;padding:10px 14px;outline:none;transition:border-color 0.2s;resize:vertical}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field select option{background:var(--surface)}
    .btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:var(--mono);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;transition:background 0.2s;margin-top:8px}
    .btn-primary:hover{background:var(--accent2)}
    .login-error{margin-top:12px;padding:10px 14px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-family:var(--mono);font-size:0.65rem;display:none}
    #app{display:none;min-height:100vh;flex-direction:column}
    #app.visible{display:flex}
    .topbar{height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .topbar-logo{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent)}
    .topbar-sep{width:1px;height:16px;background:var(--border2)}
    .topbar-title{font-family:var(--mono);font-size:0.7rem;color:var(--muted)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .btn-sm{padding:6px 14px;background:transparent;border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s;white-space:nowrap}
    .btn-sm:hover{border-color:var(--accent);color:var(--accent)}
    .btn-sm.danger:hover{border-color:var(--red);color:var(--red)}
    .btn-sm.green{border-color:rgba(34,197,94,0.4);color:var(--green)}
    .btn-sm.green:hover{border-color:var(--green)}
    .main{flex:1;display:flex;overflow:hidden}
    .sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
    .sidebar-label{padding:8px 16px 4px;font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
    .nav-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--muted);transition:all 0.15s;border-left:2px solid transparent}
    .nav-item:hover{color:var(--text);background:rgba(79,156,249,0.04)}
    .nav-item.active{color:var(--accent);background:rgba(79,156,249,0.08);border-left-color:var(--accent)}
    .nav-icon{font-size:0.9rem;width:18px;text-align:center}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
    .bottom-nav-inner{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .bottom-nav-inner::-webkit-scrollbar{display:none}
    .bnav-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 16px;cursor:pointer;font-family:var(--mono);font-size:0.52rem;color:var(--muted);transition:color 0.15s;white-space:nowrap;border-bottom:2px solid transparent}
    .bnav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
    .bnav-icon{font-size:1.1rem}
    .content{flex:1;overflow-y:auto;padding:24px;padding-bottom:80px}
    .panel{background:var(--surface);border:1px solid var(--border);margin-bottom:20px}
    .panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .panel-title{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text)}
    .panel-body{padding:20px}
    .upload-zone{border:1px dashed var(--border2);padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
    .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(79,156,249,0.04)}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-icon{font-size:2rem;margin-bottom:12px;opacity:0.5}
    .upload-text{font-size:0.85rem;color:var(--muted);margin-bottom:4px}
    .upload-sub{font-family:var(--mono);font-size:0.6rem;color:var(--muted)}
    .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .type-btn{padding:10px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;color:var(--muted)}
    .type-btn.selected{border-color:var(--accent);background:rgba(79,156,249,0.08);color:var(--accent)}
    .type-btn-icon{font-size:1.2rem}
    .type-btn-label{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase}
    .form-row{display:flex;gap:8px;margin-bottom:12px}
    .form-row .field{flex:1;margin-bottom:0}
    .input-full{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.8rem;padding:9px 12px;outline:none;transition:border-color 0.2s}
    .input-full:focus{border-color:var(--accent)}
    .path-hint{font-family:var(--mono);font-size:0.65rem;color:var(--muted);padding:8px 12px;background:rgba(79,156,249,0.04);border:1px solid rgba(79,156,249,0.15);margin-bottom:12px;word-break:break-all}
    .path-hint span{color:var(--accent)}
    .queue-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .queue-item:last-child{border-bottom:none}
    .queue-name{flex:1;font-size:0.8rem;word-break:break-all}
    .queue-size{font-family:var(--mono);font-size:0.65rem;color:var(--muted)}
    .queue-status{font-family:var(--mono);font-size:0.6rem;padding:2px 8px;text-transform:uppercase}
    .status-pending{color:var(--muted)}.status-uploading{color:var(--accent)}.status-done{color:var(--green)}.status-error{color:var(--red)}
    .progress-wrap{height:2px;background:var(--border);margin-top:6px;border-radius:1px}
    .progress-bar{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s}
    .queue-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.9rem;padding:2px 6px;transition:color 0.2s}
    .queue-remove:hover{color:var(--red)}
    .file-table{width:100%;border-collapse:collapse}
    .file-table th{text-align:left;padding:8px 12px;font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
    .file-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.78rem;vertical-align:middle}
    .file-table tr:hover td{background:rgba(79,156,249,0.03)}
    .file-table tr:last-child td{border-bottom:none}
    .file-key{font-family:var(--mono);font-size:0.7rem;word-break:break-all}
    .file-size{font-family:var(--mono);font-size:0.65rem;color:var(--muted);white-space:nowrap}
    .file-type-badge{padding:2px 7px;font-family:var(--mono);font-size:0.55rem;text-transform:uppercase;border:1px solid;white-space:nowrap}
    .badge-tvshows{color:#60a5fa;border-color:rgba(96,165,250,0.3)}
    .badge-movies{color:#a78bfa;border-color:rgba(167,139,250,0.3)}
    .badge-music{color:#34d399;border-color:rgba(52,211,153,0.3)}
    .badge-drive{color:#e879f9;border-color:rgba(232,121,249,0.3)}
    .badge-other{color:var(--muted);border-color:var(--border2)}
    .action-btn{background:none;border:1px solid var(--border2);color:var(--muted);cursor:pointer;padding:4px 10px;font-family:var(--mono);font-size:0.58rem;text-transform:uppercase;transition:all 0.15s;margin-left:4px}
    .action-btn:hover{border-color:var(--accent);color:var(--accent)}
    .action-btn.del:hover{border-color:var(--red);color:var(--red)}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .stat-card{background:var(--surface);border:1px solid var(--border);padding:16px 20px}
    .stat-card-num{font-family:var(--mono);font-size:1.6rem;font-weight:300;color:var(--accent)}
    .stat-card-label{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .search-bar{display:flex;gap:8px;margin-bottom:16px}
    .search-bar input{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:0.75rem;padding:8px 14px;outline:none;transition:border-color 0.2s}
    .search-bar input:focus{border-color:var(--accent)}
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border2);padding:28px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto}
    .modal-title{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
    .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
    .btn-cancel{padding:8px 20px;background:transparent;border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;transition:all 0.2s}
    .btn-cancel:hover{border-color:var(--text);color:var(--text)}
    .btn-confirm{padding:8px 20px;background:var(--accent);border:none;color:#fff;cursor:pointer;font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;transition:background 0.2s}
    .btn-confirm:hover{background:var(--accent2)}
    .share-card{background:var(--bg);border:1px solid var(--border2);padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
    .share-card-info{flex:1;min-width:0}
    .share-card-name{font-size:0.85rem;margin-bottom:6px}
    .share-card-meta{font-family:var(--mono);font-size:0.6rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
    .share-card-link{font-family:var(--mono);font-size:0.65rem;color:var(--accent);cursor:pointer;word-break:break-all}
    .share-card-pw{display:inline-block;padding:1px 8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:var(--yellow);font-family:var(--mono);font-size:0.6rem;margin-top:4px}
    .tag{display:inline-block;padding:1px 7px;font-family:var(--mono);font-size:0.52rem;text-transform:uppercase;border:1px solid;margin-left:6px}
    .tag-expired{color:var(--red);border-color:rgba(239,68,68,0.3)}
    .tag-active{color:var(--green);border-color:rgba(34,197,94,0.3)}
    .spinner{display:inline-block;width:14px;height:14px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-box{text-align:center;padding:40px;color:var(--muted);font-family:var(--mono);font-size:0.7rem}
    #toast{position:fixed;bottom:80px;right:24px;z-index:999;padding:12px 20px;font-family:var(--mono);font-size:0.7rem;border-left:3px solid var(--green);background:var(--surface);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);transform:translateY(80px);opacity:0;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);pointer-events:none;max-width:calc(100vw - 48px)}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.error{border-left-color:var(--red)}
    @media(max-width:768px){
      .sidebar{display:none}
      .bottom-nav{display:block}
      .content{padding:16px;padding-bottom:90px}
      #toast{bottom:90px;right:12px;left:12px}
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Kingsley · Media</div>
    <h1 class="login-title">管理后台</h1>
    <div class="field"><label>密码</label><input type="password" id="pw-input" placeholder="输入管理密码"/></div>
    <button class="btn-primary" id="login-btn">登录</button>
    <div class="login-error" id="login-error">密码错误</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">KM · Admin</div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm danger" id="logout-btn">退出</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-label">媒体</div>
      <div class="nav-item active" data-page="upload"><span class="nav-icon">⬆</span> 上传文件</div>
      <div class="nav-item" data-page="external"><span class="nav-icon">🔗</span> 外部直链</div>
      <div class="nav-item" data-page="files"><span class="nav-icon">📁</span> 文件管理</div>
      <div class="sidebar-label">管理</div>
      <div class="nav-item" data-page="categories"><span class="nav-icon">🏷</span> 分类管理</div>
      <div class="nav-item" data-page="share"><span class="nav-icon">📤</span> 分享管理</div>
      <div class="nav-item" data-page="drive"><span class="nav-icon">💾</span> 临时网盘</div>
      <div class="nav-item" data-page="upload-tokens"><span class="nav-icon">🔑</span> 上传令牌</div>
    </div>

    <div class="content">
      <div id="page-upload">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-card-num" id="s-total">—</div><div class="stat-card-label">总文件</div></div>
          <div class="stat-card"><div class="stat-card-num" id="s-movie">—</div><div class="stat-card-label">电影</div></div>
          <div class="stat-card"><div class="stat-card-num" id="s-tv">—</div><div class="stat-card-label">电视剧</div></div>
          <div class="stat-card"><div class="stat-card-num" id="s-music">—</div><div class="stat-card-label">音乐</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">上传媒体</span></div>
          <div class="panel-body">
            <div class="field"><label>媒体类型</label><div class="type-grid" id="upload-type-grid"></div></div>
            <div class="form-row">
              <div class="field"><label>作品名称</label><input class="input-full" id="media-name" placeholder="例：星际穿越 (2014)"/></div>
            </div>
            <div class="path-hint">路径预览：<span id="path-preview">media/movies/</span></div>
            <div class="upload-zone" id="drop-zone">
              <input type="file" id="file-input" multiple/>
              <div class="upload-text">点击或拖拽上传</div>
            </div>
          </div>
        </div>
        <div class="panel" id="queue-panel" style="display:none">
          <div class="panel-header"><span class="panel-title">队列</span><button class="btn-sm green" id="upload-all-btn">开始上传</button></div>
          <div id="queue-list"></div>
        </div>
      </div>

      <div id="page-external" style="display:none">
        <div class="panel"><div class="panel-header"><span class="panel-title">外部直链</span><button class="btn-sm green" id="add-ext-btn">＋ 添加</button></div><div class="panel-body" id="ext-list"></div></div>
      </div>
      <div id="page-files" style="display:none">
        <div class="panel"><div class="panel-header"><span class="panel-title">文件列表</span><button class="btn-sm" id="refresh-btn">刷新</button></div><div class="panel-body"><div class="search-bar"><input id="file-search" placeholder="搜索..."/></div><table class="file-table"><thead><tr><th>路径</th><th>操作</th></tr></thead><tbody id="file-tbody"></tbody></table></div></div>
      </div>
      <div id="page-categories" style="display:none">
        <div class="panel"><div class="panel-header"><span class="panel-title">分类</span><button class="btn-sm green" id="add-cat-btn">＋ 添加</button></div><div class="panel-body" id="cat-list"></div></div>
      </div>
      <div id="page-share" style="display:none">
        <div class="panel">
           <div class="panel-header"><span class="panel-title">创建分享</span></div>
           <div class="panel-body">
             <div class="field"><label>标题</label><input class="input-full" id="share-title"/></div>
             <div class="field"><label>文件路径(每行一个)</label><textarea class="input-full" id="share-files" rows="4"></textarea></div>
             <button class="btn-primary" id="create-share-btn">生成链接</button>
           </div>
        </div>
        <div class="panel"><div class="panel-header"><span class="panel-title">已有分享</span></div><div class="panel-body" id="share-list"></div></div>
      </div>
      <div id="page-drive" style="display:none">
        <div class="panel"><div class="panel-header"><span class="panel-title">临时网盘</span></div><div class="panel-body" id="drive-file-list"></div></div>
      </div>

      <div id="page-upload-tokens" style="display:none">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">创建上传令牌</span></div>
          <div class="panel-body">
            <div class="field"><label>令牌名称 (存储目录)</label><input class="input-full" id="ut-name" placeholder="我的收集箱"/></div>
            <div class="form-row">
              <div class="field"><label>有效期至</label><input class="input-full" id="ut-end" type="datetime-local"/></div>
              <div class="field"><label>密码 (可选)</label><input class="input-full" id="ut-password" placeholder="留空则无"/></div>
            </div>
            <button class="btn-primary" id="create-token-btn">生成上传链接</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">已创建令牌</span><button class="btn-sm" id="refresh-tokens-btn">刷新</button></div>
          <div class="panel-body" id="token-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ADMIN_PW_KEY = 'mkm_admin_token';
let authToken = sessionStorage.getItem(ADMIN_PW_KEY) || '';

const BUILTIN_CATS = [
  { name: '电影', slug: 'movies', icon: '🎬', color: '#a78bfa' },
  { name: '电视剧', slug: 'tvshows', icon: '📺', color: '#60a5fa' },
  { name: '音乐', slug: 'music', icon: '🎵', color: '#34d399' }
];

function authHeaders() { 
  return { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' }; 
}

// 登录逻辑
document.getElementById('login-btn').onclick = async () => {
  const pw = document.getElementById('pw-input').value;
  try {
    const res = await fetch('/api/admin/auth', { 
      method: 'POST', 
      body: JSON.stringify({ password: pw }), 
      headers: {'Content-Type':'application/json'} 
    });
    if (res.ok) {
      const d = await res.json(); 
      authToken = d.token;
      sessionStorage.setItem(ADMIN_PW_KEY, authToken);
      initApp();
    } else { 
      document.getElementById('login-error').style.display = 'block'; 
    }
  } catch(e) { console.error(e); }
};

function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadStats(); 
  buildTypeGrid();
}

if(authToken) initApp();

document.getElementById('logout-btn').onclick = () => { 
  sessionStorage.removeItem(ADMIN_PW_KEY); 
  location.reload(); 
};

// 页面切换
document.querySelectorAll('.nav-item').forEach(item => {
  item.onclick = () => {
    const p = item.dataset.page;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.content > div').forEach(d => d.style.display = 'none');
    document.getElementById(`page-${p}`).style.display = 'block';
    
    // 按需加载数据
    if(p === 'upload-tokens') loadTokens();
    if(p === 'share') loadShares();
    if(p === 'files') loadFiles();
  };
});

// 上传相关逻辑
function buildTypeGrid() {
  const grid = document.getElementById('upload-type-grid');
  grid.innerHTML = BUILTIN_CATS.map(c => `
    <button class="type-btn" onclick="selectType('${c.slug}')">
      <span class="type-btn-icon">${c.icon}</span>
      <span class="type-btn-label">${c.name}</span>
    </button>
  `).join('');
}

window.selectType = (s) => {
  document.querySelectorAll('.type-btn').forEach(b => {
    const label = b.querySelector('.type-btn-label').innerText;
    const match = BUILTIN_CATS.find(c => c.slug === s);
    b.classList.toggle('selected', match && label === match.name);
  });
  updatePathPreview();
};

function updatePathPreview() {
  const sel = document.querySelector('.type-btn.selected .type-btn-label');
  const type = sel ? BUILTIN_CATS.find(c => c.name === sel.innerText).slug : 'movies';
  const name = document.getElementById('media-name').value;
  document.getElementById('path-preview').innerHTML = `media/<span>${type}</span>/${name}`;
}

document.getElementById('media-name').oninput = updatePathPreview;

// Upload Tokens 逻辑修复
async function loadTokens() {
  const container = document.getElementById('token-list');
  container.innerHTML = '<div class="empty-box"><span class="spinner"></span> 加载中...</div>';
  try {
    const res = await fetch('/api/admin/upload-tokens', { headers: authHeaders() });
    if(res.ok) {
      const data = await res.json();
      renderTokens(data.tokens || []);
    }
  } catch(e) { container.innerHTML = '<div class="empty-box">加载失败</div>'; }
}

function renderTokens(tokens) {
  const c = document.getElementById('token-list');
  if(!tokens.length) { c.innerHTML = '<div class="empty-box">暂无令牌</div>'; return; }
  c.innerHTML = tokens.map(t => `
    <div class="share-card">
      <div class="share-card-info">
        <div class="share-card-name">${t.name}</div>
        <div class="share-card-link" onclick="copyText('${location.origin}/upload/${t.id}')">${location.origin}/upload/${t.id}</div>
      </div>
      <button class="action-btn del" onclick="deleteToken('${t.id}')">删除</button>
    </div>
  `).join('');
}

document.getElementById('create-token-btn').onclick = async () => {
  const name = document.getElementById('ut-name').value.trim();
  const endInput = document.getElementById('ut-end').value;
  if(!name || !endInput) { toast('请完整填写名称和有效期', true); return; }
  
  const endTime = new Date(endInput).getTime();
  try {
    const res = await fetch('/api/admin/upload-tokens', {
      method: 'POST', 
      headers: authHeaders(),
      body: JSON.stringify({ name, endTime, password: document.getElementById('ut-password').value })
    });
    if(res.ok) { toast('令牌已创建'); loadTokens(); }
  } catch(e) { toast('创建失败', true); }
};

async function deleteToken(id) {
  if(!confirm('确定删除此上传令牌吗?')) return;
  try {
    const res = await fetch('/api/admin/upload-tokens', { 
      method: 'DELETE', 
      headers: authHeaders(), 
      body: JSON.stringify({ id }) 
    });
    if(res.ok) { toast('已删除'); loadTokens(); }
  } catch(e) { toast('删除失败', true); }
}

// 工具函数
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.className = err ? 'error show' : 'show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function copyText(txt) { 
  navigator.clipboard.writeText(txt); 
  toast('已复制到剪贴板'); 
}

async function loadStats() {
  try {
    const res = await fetch('/api/list');
    if(res.ok) {
      const d = await res.json();
      document.getElementById('s-total').innerText = d.items.length;
      // 此处可扩展分类统计
    }
  } catch(e) { console.error(e); }
}
