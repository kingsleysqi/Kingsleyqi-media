<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Kingsley Media</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0c0f;--surface:#111318;--border:#1e2230;--border2:#2a2f42;--accent:#4f9cf9;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
    /* ...（样式部分保持不变，我这里省略以节省篇幅，但你复制时要保留原样式）... */
    /* 请把你原来的 <style> 整个复制进来，这里为了简洁省略了，但实际替换时必须包含完整样式 */
  </style>
</head>
<body>

<!-- HTML 结构部分保持完全不变（从 <div id="login-screen"> 到 </div> 结束，包括所有 modal） -->
<!-- ... 你原来的 HTML 内容全部保留 ... -->

<div id="toast"></div>

<script>
/* AUTH、CATEGORIES、NAV、UPLOAD TYPE GRID 等部分全部保持不变（从开头到 renderDriveQueue() 之前） */
/* 这里省略中间不变代码，直接给出关键修改部分 */

let driveQueue = [];
setupDrop('drive-drop-zone', 'drive-file-input', files => {
  files.forEach(f => driveQueue.push({ file: f, path: `drive/${f.name}`, status: 'pending', progress: 0, isDrive: true }));
  renderDriveQueue();
});

function renderDriveQueue() {
  const panel = document.getElementById('drive-queue-panel'), list = document.getElementById('drive-queue-list');
  if (!driveQueue.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  list.innerHTML = driveQueue.map((item, i) => queueItemHTML(item, i, 'removeDQ')).join('');
}
window.removeDQ = i => { driveQueue.splice(i, 1); renderDriveQueue(); };
document.getElementById('drive-upload-btn').onclick = () => startUpload(driveQueue, renderDriveQueue, () => { loadDriveFiles(); toast('上传完成！'); }, true);

function queueItemHTML(item, i, removeFn) {
  return `<div class="queue-item">
    <div style="flex:1">
      <div class="queue-name">${escHtml(item.path)}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <span class="queue-size">${fmt(item.file.size)}</span>
        <span class="queue-status status-\( {item.status}"> \){statusLabel(item.status)}</span>
      </div>
      \( {item.status==='uploading'||item.status==='done' ? `<div class="progress-wrap"><div class="progress-bar" style="width: \){item.progress}%"></div></div>` : ''}
    </div>
    \( {item.status==='pending' ? `<button class="queue-remove" onclick=" \){removeFn}(${i})">✕</button>` : ''}
  </div>`;
}

/* ==================== 关键修复部分 ==================== */
async function startUpload(queue, renderFn, doneFn, isDrive = false) {
  const pending = queue.filter(i => i.status === 'pending');
  if (!pending.length) {
    toast('没有待上传的文件', true);
    return;
  }

  for (const item of pending) {
    item.status = 'uploading';
    renderFn();

    try {
      // 中文路径安全处理
      let safeKey = item.path.trim();
      if (isDrive && !safeKey.startsWith('drive/')) {
        safeKey = 'drive/' + safeKey;
      }

      const body = { 
        key: safeKey, 
        contentType: item.file.type || 'application/octet-stream' 
      };
      if (isDrive) body.allowDrive = true;

      const res = await fetch('/api/admin/upload-url', {
        method: 'POST', 
        headers: authHeaders(), 
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || `请求失败 (${res.status})`);
      }

      const { url } = await res.json();

      // XHR 上传（支持进度 + 更好错误处理）
      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', url);
        xhr.setRequestHeader('Content-Type', item.file.type || 'application/octet-stream');

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            item.progress = Math.round((e.loaded / e.total) * 100);
            renderFn();
          }
        };

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) resolve();
          else reject(new Error(`上传失败 HTTP ${xhr.status}`));
        };

        xhr.onerror = () => reject(new Error('网络错误或签名失效'));
        xhr.ontimeout = () => reject(new Error('上传超时'));

        xhr.send(item.file);
      });

      item.status = 'done';
      item.progress = 100;
      toast(`${item.file.name} 上传成功`);

    } catch (err) {
      console.error('上传错误详情:', err);
      item.status = 'error';
      toast(`上传失败：${item.file.name} — ${err.message}`, true);
    }

    renderFn();
  }

  if (typeof doneFn === 'function') doneFn();
}
/* ==================== 修复结束 ==================== */

/* 后面的 DRIVE FILES、EXTERNAL、FILES、CATEGORIES、SHARE、STATS、HELPERS 等代码全部保持你原来的不变 */

async function loadDriveFiles() { /* ... 你原来的代码 ... */ }
/* ... 其余所有函数保持不变 ... */

</script>
</body>
</html>
