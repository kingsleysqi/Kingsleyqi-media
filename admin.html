<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体库后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #c9a84c33;
        }
        h1 { color: #c9a84c; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 14px; }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }
        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 15px;
            border-bottom: 2px solid transparent;
        }
        .tab:hover { color: #c9a84c; }
        .tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
        
        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            background: #1e1e1e;
            border: 1px solid #c9a84c66;
            color: #c9a84c;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        button:hover {
            background: #c9a84c;
            color: #0a0a0a;
        }
        .btn-danger { border-color: #dc2626; color: #dc2626; }
        .btn-danger:hover { background: #dc2626; color: white; }
        .btn-success { border-color: #10b981; color: #10b981; }
        .btn-success:hover { background: #10b981; color: white; }
        
        /* 文件列表 */
        .file-list, .category-list {
            background: #111;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a2a;
        }
        .file-item:hover { background: #1a1a1a; }
        .file-info { flex: 1; word-break: break-all; }
        .file-meta { color: #666; font-size: 11px; margin-top: 4px; }
        .file-actions { display: flex; gap: 8px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .stat-number { font-size: 28px; font-weight: bold; color: #c9a84c; }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        
        .search-box input {
            padding: 8px 12px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #e5e5e5;
            border-radius: 6px;
            width: 250px;
        }
        
        .loading, .empty {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            background: #c9a84c;
            color: #0a0a0a;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { background: #dc2626; color: white; }
        .toast.success { background: #10b981; color: white; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .file-item { flex-direction: column; gap: 12px; }
            .file-actions { width: 100%; justify-content: flex-end; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 媒体库管理系统</h1>
        <div class="subtitle">文件管理 · 分类配置</div>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-tab="files">📁 文件管理</button>
        <button class="tab" data-tab="categories">🏷️ 分类配置</button>
    </div>
    
    <div id="files-tab">
        <div class="toolbar">
            <button onclick="showCreateFolder()">📁 创建文件夹</button>
            <button onclick="loadFiles()">🔄 刷新</button>
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索文件..." onkeyup="filterFiles()">
            </div>
        </div>
        <div id="stats" class="stats-grid"></div>
        <div id="file-list" class="file-list"><div class="loading">加载中...</div></div>
    </div>
    
    <div id="categories-tab" style="display:none">
        <div class="toolbar">
            <button onclick="showAddCategory()">➕ 添加分类</button>
            <button onclick="loadCategories()">🔄 刷新</button>
        </div>
        <div id="category-list" class="category-list"><div class="loading">加载中...</div></div>
    </div>
</div>

<script>
let allFiles = [];
let searchKeyword = '';
let adminToken = localStorage.getItem('admin_token');

// 显示消息
function showMessage(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// 获取认证头
function getHeaders() {
    const headers = { 'Content-Type': 'application/json' };
    if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
    return headers;
}

// 检查认证
async function checkAuth() {
    if (!adminToken) {
        const pwd = prompt('请输入管理员密码：');
        if (pwd) await login(pwd);
        else return false;
    }
    
    try {
        const res = await fetch('/api/admin/auth', {
            headers: { 'Authorization': `Bearer ${adminToken}` }
        });
        if (res.status === 401) {
            localStorage.removeItem('admin_token');
            adminToken = null;
            const pwd = prompt('会话过期，请重新输入密码：');
            if (pwd) await login(pwd);
            else return false;
        }
        return res.ok;
    } catch(e) {
        console.error('Auth check failed:', e);
        return false;
    }
}

// 登录
async function login(password) {
    try {
        const res = await fetch('/api/admin/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (res.ok) {
            adminToken = data.token;
            localStorage.setItem('admin_token', adminToken);
            showMessage('登录成功');
            loadFiles();
            return true;
        } else {
            showMessage(data.error || '登录失败', 'error');
            return false;
        }
    } catch(e) {
        showMessage('登录失败: ' + e.message, 'error');
        return false;
    }
}

// 加载文件列表
async function loadFiles() {
    const listDiv = document.getElementById('file-list');
    listDiv.innerHTML = '<div class="loading">加载中...</div>';
    
    try {
        const res = await fetch('/api/admin/files', { headers: getHeaders() });
        if (!res.ok) {
            if (res.status === 401) {
                await checkAuth();
                return loadFiles();
            }
            throw new Error(`HTTP ${res.status}`);
        }
        
        const data = await res.json();
        allFiles = data.files || [];
        
        // 统计
        const mediaFiles = allFiles.filter(f => f.key.startsWith('media/'));
        const driveFiles = allFiles.filter(f => f.key.startsWith('drive/'));
        const totalSize = allFiles.reduce((s, f) => s + (f.size || 0), 0);
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-number">${allFiles.length}</div><div class="stat-label">总文件数</div></div>
            <div class="stat-card"><div class="stat-number">${mediaFiles.length}</div><div class="stat-label">媒体文件</div></div>
            <div class="stat-card"><div class="stat-number">${driveFiles.length}</div><div class="stat-label">网盘文件</div></div>
            <div class="stat-card"><div class="stat-number">${formatSize(totalSize)}</div><div class="stat-label">总大小</div></div>
        `;
        
        renderFileList();
    } catch(e) {
        console.error('Load files failed:', e);
        listDiv.innerHTML = `<div class="empty">❌ 加载失败: ${e.message}</div>`;
    }
}

function formatSize(bytes) {
    if (!bytes) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB'];
    let size = bytes, i = 0;
    while (size >= 1024 && i < units.length-1) { size /= 1024; i++; }
    return `${size.toFixed(1)} ${units[i]}`;
}

function formatDate(ts) {
    return ts ? new Date(ts).toLocaleString('zh-CN') : '';
}

function filterFiles() {
    searchKeyword = document.getElementById('search').value.toLowerCase();
    renderFileList();
}

function renderFileList() {
    let filtered = allFiles;
    if (searchKeyword) {
        filtered = allFiles.filter(f => f.key.toLowerCase().includes(searchKeyword));
    }
    
    const listDiv = document.getElementById('file-list');
    if (filtered.length === 0) {
        listDiv.innerHTML = '<div class="empty">📂 暂无文件</div>';
        return;
    }
    
    listDiv.innerHTML = filtered.map(file => `
        <div class="file-item">
            <div class="file-info">
                📄 ${escapeHtml(file.key)}
                <div class="file-meta">${formatSize(file.size)} · ${formatDate(file.uploaded)}</div>
            </div>
            <div class="file-actions">
                <button onclick="renameFile('${escapeJs(file.key)}')">重命名</button>
                <button class="btn-danger" onclick="deleteFile('${escapeJs(file.key)}')">删除</button>
            </div>
        </div>
    `).join('');
}

// 删除文件
async function deleteFile(path) {
    if (!confirm(`确定要删除 "${path}" 吗？`)) return;
    
    try {
        const res = await fetch('/api/admin/delete', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ path })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '删除失败');
        
        showMessage('删除成功');
        loadFiles();
    } catch(e) {
        showMessage(e.message, 'error');
    }
}

// 重命名文件
async function renameFile(oldPath) {
    const fileName = oldPath.split('/').pop();
    const newName = prompt('请输入新文件名（包含扩展名）：', fileName);
    if (!newName || newName === fileName) return;
    
    const lastSlash = oldPath.lastIndexOf('/');
    const dir = lastSlash === -1 ? '' : oldPath.substring(0, lastSlash + 1);
    const newPath = dir + newName;
    
    try {
        const res = await fetch('/api/admin/rename', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ from: oldPath, to: newPath })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '重命名失败');
        
        showMessage('重命名成功');
        loadFiles();
    } catch(e) {
        showMessage(e.message, 'error');
    }
}

// 创建文件夹
async function createFolder(path) {
    try {
        const res = await fetch('/api/admin/create-folder', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ folderPath: path })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '创建失败');
        
        showMessage('文件夹创建成功');
        loadFiles();
    } catch(e) {
        showMessage(e.message, 'error');
    }
}

function showCreateFolder() {
    const path = prompt('请输入文件夹路径（例如：drive/我的文件夹/ 或 media/视频/）：');
    if (path) createFolder(path.trim());
}

// 分类管理
async function loadCategories() {
    const listDiv = document.getElementById('category-list');
    listDiv.innerHTML = '<div class="loading">加载中...</div>';
    
    try {
        const res = await fetch('/api/admin/categories', { headers: getHeaders() });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        const cats = data.categories || [];
        
        if (cats.length === 0) {
            listDiv.innerHTML = '<div class="empty">📭 暂无自定义分类</div>';
            return;
        }
        
        listDiv.innerHTML = cats.map(cat => `
            <div class="file-item">
                <div class="file-info">
                    <strong>${escapeHtml(cat.name)}</strong>
                    <div class="file-meta">Slug: ${escapeHtml(cat.slug)} · 图标: ${escapeHtml(cat.icon || '无')}</div>
                </div>
                <div class="file-actions">
                    <button class="btn-danger" onclick="deleteCategory('${escapeJs(cat.slug)}')">删除</button>
                </div>
            </div>
        `).join('');
    } catch(e) {
        listDiv.innerHTML = `<div class="empty">❌ 加载失败: ${e.message}</div>`;
    }
}

async function saveCategories(categories) {
    const res = await fetch('/api/admin/categories', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ categories })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '保存失败');
    loadCategories();
    showMessage('保存成功');
}

function showAddCategory() {
    const name = prompt('请输入分类名称（例如：动漫）：');
    if (!name) return;
    const slug = prompt('请输入分类 Slug（英文标识，例如：anime）：');
    if (!slug) return;
    if (!/^[a-z0-9_-]+$/.test(slug)) {
        showMessage('Slug 只能包含小写字母、数字、下划线、连字符', 'error');
        return;
    }
    const icon = prompt('请输入图标（可选，例如：🌸）：') || '';
    
    (async () => {
        try {
            const res = await fetch('/api/admin/categories', { headers: getHeaders() });
            const data = await res.json();
            const cats = data.categories || [];
            cats.push({ name, slug, icon });
            await saveCategories(cats);
        } catch(e) {
            showMessage(e.message, 'error');
        }
    })();
}

async function deleteCategory(slug) {
    if (!confirm(`确定要删除分类 "${slug}" 吗？`)) return;
    try {
        const res = await fetch('/api/admin/categories', { headers: getHeaders() });
        const data = await res.json();
        const cats = (data.categories || []).filter(c => c.slug !== slug);
        await saveCategories(cats);
    } catch(e) {
        showMessage(e.message, 'error');
    }
}

// 标签页切换
function initTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            document.getElementById('files-tab').style.display = tabName === 'files' ? 'block' : 'none';
            document.getElementById('categories-tab').style.display = tabName === 'categories' ? 'block' : 'none';
            if (tabName === 'files') loadFiles();
            else if (tabName === 'categories') loadCategories();
        };
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
}

function escapeJs(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// 初始化
window.onload = async () => {
    initTabs();
    if (await checkAuth()) {
        loadFiles();
    }
};
</script>
</body>
</html>
