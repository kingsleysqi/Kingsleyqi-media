<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理</title>
    <style>
        /* 你的原有样式 */
    </style>
</head>
<body>
    <div id="app">
        <h1>后台管理</h1>
        <div id="file-list"></div>
    </div>

    <script>
        /**
         * 删除文件
         * @param {string} path - 文件路径
         */
        async function deleteDriveFile(path) {
            try {
                if (!path) {
                    throw new Error('文件路径不能为空');
                }

                const response = await fetch('/api/admin/delete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json', // 必须添加：指定请求体为 JSON 格式
                    },
                    body: JSON.stringify({ path }), // 序列化数据
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '删除失败，请重试');
                }

                // 刷新文件列表
                loadDriveFiles();
                alert('删除成功');
            } catch (error) {
                console.error('删除失败：', error);
                alert(`错误：${error.message}`);
            }
        }

        /**
         * 重命名文件
         * @param {string} oldPath - 原文件路径
         * @param {string} newPath - 新文件路径
         */
        async function renameDriveFile(oldPath, newPath) {
            try {
                if (!oldPath || !newPath) {
                    throw new Error('路径不能为空');
                }

                const response = await fetch('/api/admin/rename', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ oldPath, newPath }),
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '重命名失败');
                }

                loadDriveFiles();
                alert('重命名成功');
            } catch (error) {
                console.error('重命名失败：', error);
                alert(`错误：${error.message}`);
            }
        }

        /**
         * 创建文件夹
         * @param {string} folderPath - 文件夹路径
         */
        async function createFolder(folderPath) {
            try {
                if (!folderPath) {
                    throw new Error('文件夹路径不能为空');
                }

                const response = await fetch('/api/admin/create-folder', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ folderPath }),
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || '创建失败');
                }

                loadDriveFiles();
                alert('创建成功');
            } catch (error) {
                console.error('创建失败：', error);
                alert(`错误：${error.message}`);
            }
        }

        /**
         * 加载文件列表
         */
        async function loadDriveFiles() {
            try {
                const response = await fetch('/api/list');
                const files = await response.json();
                const fileList = document.getElementById('file-list');
                fileList.innerHTML = files.map(file => `
                    <div>
                        <span>${file.name}</span>
                        <button onclick="deleteDriveFile('${file.path}')">删除</button>
                        <button onclick="renameDriveFile('${file.path}', prompt('新名称'))">重命名</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('加载失败：', error);
            }
        }

        // 页面加载时初始化
        window.onload = loadDriveFiles;
    </script>
</body>
</html>
